<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🕉️ PANDIT JI — Your Spiritual Guide</title>
<meta name="description" content="Your All-in-One Digital Hindu Spiritual Home — Temples, Mantras, Sacred Texts, Horoscope, Pooja Guides & AI Assistant"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --saffron:#FF6B35;--gold:#F5A623;--maroon:#8B1A1A;--maroon-dark:#6B1E1E;
  --deep:#2C1810;--cream:#FFF8F0;--cream2:#FFF3E0;--white:#fff;
  --border:rgba(245,166,35,.22);--shadow:0 6px 28px rgba(139,26,26,.13);
  --r:14px;--tr:all .22s cubic-bezier(.4,0,.2,1);
  --display:'Cinzel',Georgia,serif;--body:'Crimson Text',Georgia,serif;
  --dev:'Noto Sans Devanagari',serif;
  --success:#2E7D32;--info:#1565C0;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--cream);color:var(--deep);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--display);line-height:1.2}
button{font-family:var(--body);cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:var(--body);outline:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--saffron);border-radius:3px}
.dev{font-family:var(--dev)}
.con{max-width:1200px;margin:0 auto;padding:0 24px}
.sec{padding:56px 0}
.sec-title{font-family:var(--display);font-size:clamp(20px,3vw,30px);color:var(--maroon);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.divider{width:52px;height:3px;background:linear-gradient(90deg,var(--saffron),var(--gold));border-radius:2px;margin-bottom:32px}
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 12px rgba(139,26,26,.07);transition:var(--tr)}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 22px;border-radius:30px;font-size:15px;font-weight:600;transition:var(--tr);white-space:nowrap;font-family:var(--body)}
.btn-p{background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;box-shadow:0 4px 16px rgba(255,107,53,.32)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,53,.42)}
.btn-o{background:transparent;color:var(--maroon);border:2px solid var(--border)}
.btn-o:hover{background:rgba(139,26,26,.07);border-color:var(--saffron)}
.btn-d{background:linear-gradient(135deg,var(--maroon-dark),var(--maroon));color:var(--cream)}
.btn-d:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.tag{display:inline-block;background:rgba(255,107,53,.1);color:#E65100;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.5px}
.live-dot{display:inline-block;width:8px;height:8px;background:#ef5350;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes audioWave{0%,100%{height:4px}50%{height:16px}}
.aw{display:inline-block;width:3px;background:linear-gradient(var(--saffron),var(--gold));border-radius:2px;animation:audioWave .6s ease-in-out infinite}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}
.fade-up{animation:fadeUp .45s ease forwards}
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:200;background:linear-gradient(135deg,#1a0a05,var(--deep),var(--maroon-dark));box-shadow:0 4px 24px rgba(139,26,26,.45)}
.nav-inner{max-width:1300px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:66px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.logo-om{font-size:26px}
.logo-name{font-family:var(--display);font-size:18px;font-weight:700;color:var(--gold)}
.logo-sub{font-size:11px;color:rgba(255,248,240,.45)}
.nav-links{display:flex;gap:2px;flex-wrap:nowrap}
.nl{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;background:transparent;border:1px solid transparent;color:rgba(255,248,240,.78);font-size:13px;font-family:var(--body);transition:var(--tr);white-space:nowrap;cursor:pointer}
.nl:hover{color:var(--gold);background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.25)}
.nl.act{color:var(--gold);background:rgba(245,166,35,.18);border-color:rgba(245,166,35,.4)}
.hb{display:none;flex-direction:column;gap:5px;background:transparent;border:none;cursor:pointer;padding:6px}
.hb span{display:block;width:22px;height:2px;background:var(--gold);border-radius:2px;transition:all .3s}
.mob-menu{max-height:0;overflow:hidden;background:#1a0a05;transition:max-height .35s ease}
.mob-menu.open{max-height:600px}
.mob-link{display:flex;align-items:center;gap:12px;width:100%;padding:14px 24px;background:transparent;border:none;border-bottom:1px solid rgba(245,166,35,.1);color:rgba(255,248,240,.85);font-size:15px;font-family:var(--body);cursor:pointer;text-align:left}
.mob-link.act,.mob-link:hover{color:var(--gold);background:rgba(245,166,35,.08)}
@media(max-width:960px){.nav-links{display:none}.hb{display:flex}}

/* ── HERO ── */
.hero{background:linear-gradient(160deg,#1a0a05 0%,var(--deep) 35%,var(--maroon-dark) 70%,var(--maroon) 100%);padding:88px 24px 68px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(245,166,35,.07) 0,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(255,107,53,.06) 0,transparent 40%);pointer-events:none}
.hero-om{font-family:var(--dev);font-size:88px;color:rgba(245,166,35,.14);line-height:1;margin-bottom:-18px;animation:float 5s ease-in-out infinite}
.hero-h1{font-family:var(--display);font-size:clamp(26px,5vw,52px);font-weight:900;color:var(--gold);text-shadow:0 2px 28px rgba(245,166,35,.35);margin-bottom:10px;position:relative}
.hero-sub{font-size:clamp(15px,2.5vw,20px);color:rgba(255,248,240,.82);margin-bottom:5px;position:relative}
.hero-en{font-size:14px;color:rgba(255,248,240,.5);margin-bottom:10px;font-style:italic;position:relative}
.hero-shloka{font-size:13px;color:rgba(255,248,240,.38);margin-bottom:34px;position:relative}
.hero-search{display:flex;max-width:540px;margin:0 auto 36px;position:relative}
.hero-inp{flex:1;padding:14px 22px;border:2px solid rgba(245,166,35,.4);border-right:none;border-radius:32px 0 0 32px;background:rgba(255,248,240,.96);font-size:15px;font-family:var(--body);color:var(--deep)}
.hero-sbtn{padding:14px 20px;background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;border:none;border-radius:0 32px 32px 0;font-weight:700;font-size:15px;cursor:pointer}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.h-stat{display:flex;flex-direction:column;align-items:center}
.h-stat-n{font-family:var(--display);font-size:24px;font-weight:700;color:var(--gold)}
.h-stat-l{font-size:11px;color:rgba(255,248,240,.5);text-transform:uppercase;letter-spacing:1px}

/* ── DEITIES ── */
.deity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.deity-card{border-radius:14px;padding:18px 10px;text-align:center;cursor:pointer;transition:var(--tr);border:2px solid transparent}
.deity-card:hover{transform:translateY(-5px)}
.d-em{font-size:34px;margin-bottom:8px}
.d-name{font-family:var(--display);font-size:13px;font-weight:700;color:var(--deep);margin-bottom:2px}
.d-hindi{font-size:12px;color:var(--maroon)}
.d-bl{font-size:10px;color:#888;margin-top:3px}

/* ── SHLOKA BAND ── */
.shloka-band{background:linear-gradient(135deg,var(--deep),var(--maroon-dark));padding:52px 0;text-align:center}
.sh-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.sh-text{font-size:clamp(16px,3vw,26px);color:var(--cream);line-height:1.85;margin-bottom:16px;white-space:pre-line}
.sh-tr{font-size:14px;color:rgba(255,248,240,.68);font-style:italic;max-width:580px;margin:0 auto 8px;line-height:1.6}
.sh-src{font-size:12px;color:var(--gold);opacity:.7}

/* ── FEATURES ── */
.feat-card{padding:22px;cursor:pointer;position:relative}
.f-icon{font-size:30px;margin-bottom:10px}
.f-title{font-family:var(--display);font-size:15px;font-weight:700;color:var(--maroon);margin-bottom:7px}
.f-desc{font-size:13px;color:#666;line-height:1.5}
.f-arr{position:absolute;bottom:18px;right:18px;color:var(--gold);font-size:17px;opacity:0;transition:all .2s}
.feat-card:hover .f-arr{opacity:1;transform:translateX(4px)}

/* ── CTA ── */
.cta-band{background:linear-gradient(135deg,var(--maroon-dark),var(--maroon),var(--saffron));padding:60px 0}
.cta-inner{display:flex;align-items:center;justify-content:space-between;gap:28px;flex-wrap:wrap}
.cta-h{font-family:var(--display);font-size:clamp(20px,3vw,30px);color:var(--cream);margin-bottom:10px}
.cta-p{font-size:15px;color:rgba(255,248,240,.72);line-height:1.6;max-width:460px}
.cta-btns{display:flex;flex-direction:column;gap:10px;flex-shrink:0}

/* ── PAGE HEADER ── */
.ph{background:linear-gradient(135deg,var(--deep),var(--maroon-dark));padding:46px 0 30px;color:var(--cream)}
.pt{font-family:var(--display);font-size:clamp(20px,4vw,34px);color:var(--gold);margin-bottom:7px}
.ps{font-size:14px;color:rgba(255,248,240,.62);max-width:540px}

/* ── FLOWER PETAL ANIMATION ── */
.petals-container{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1}
.petal{position:absolute;top:-40px;animation:petalFall linear infinite;opacity:0;pointer-events:none;user-select:none;font-size:18px}
@keyframes petalFall{
  0%{transform:translateY(-40px) rotate(0deg) translateX(0);opacity:0}
  5%{opacity:.85}
  85%{opacity:.6}
  100%{transform:translateY(110vh) rotate(720deg) translateX(80px);opacity:0}
}
@keyframes sway{
  0%,100%{margin-left:0px}
  25%{margin-left:30px}
  75%{margin-left:-30px}
}
.hero-inner-content{position:relative;z-index:2}
/* ── ONLINE DARSHAN SECTION ── */
.darshan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.darshan-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:var(--tr)}
.darshan-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.darshan-thumb{height:160px;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;overflow:hidden}
.darshan-live-badge{position:absolute;top:10px;left:10px;background:#ef5350;color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;animation:pulse 1.5s infinite}
.darshan-time-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;padding:4px 10px;border-radius:12px;font-size:11px}
.darshan-body{padding:16px 18px 20px}
.darshan-name{font-family:var(--display);font-size:16px;color:var(--maroon);margin-bottom:3px}
.darshan-loc{font-size:12px;color:#888;margin-bottom:10px}
.darshan-btn{width:100%;padding:10px;border-radius:20px;border:none;font-family:var(--body);font-size:14px;font-weight:700;cursor:pointer;transition:var(--tr)}
.darshan-btn.live{background:linear-gradient(135deg,#ef5350,#e53935);color:#fff}
.darshan-btn.yt{background:linear-gradient(135deg,#FF0000,#CC0000);color:#fff}
.darshan-btn.schedule{background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff}
body.dark .darshan-card{background:#231510}
.t-filter-bar{background:linear-gradient(135deg,rgba(255,248,240,.95),rgba(255,243,224,.95));border-radius:16px;padding:18px 20px;margin-top:18px;border:1px solid var(--border)}
.t-filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.t-filter-row:last-child{margin-bottom:0}
.t-filter-label{font-size:11px;font-weight:700;color:var(--saffron);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.t-sel{padding:9px 14px;border-radius:20px;border:2px solid rgba(245,166,35,.3);background:rgba(255,255,255,.9);font-size:13px;font-family:var(--body);color:var(--deep);cursor:pointer;min-width:140px}
.t-sel:focus{border-color:var(--saffron);outline:none}
.t-crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
.t-crumb-item{display:flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600}
.t-crumb-item button{background:transparent;border:none;color:#fff;cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 4px}
.t-stats-row{display:flex;align-items:center;gap:16px;padding:10px 0 2px;flex-wrap:wrap}
.t-stat-chip{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
body.dark .t-filter-bar{background:linear-gradient(135deg,#2e1c14,#231510)}
body.dark .t-sel{background:#231510;color:#FFF8F0;border-color:rgba(245,166,35,.25)}
/* ── TEMPLE DEITY FILTER PILLS ── */
.deity-pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.dp{padding:5px 13px;border-radius:16px;border:1px solid rgba(245,166,35,.3);background:transparent;font-size:12px;font-family:var(--body);cursor:pointer;transition:var(--tr);color:var(--deep)}
.dp.act{background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;border-color:transparent}
.dp:hover:not(.act){background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.3)}
.t-filters{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.s-inp{padding:11px 18px;border-radius:24px;border:2px solid rgba(245,166,35,.35);background:rgba(255,248,240,.96);font-size:14px;font-family:var(--body);color:var(--deep)}
.s-sel{padding:11px 18px;border-radius:24px;border:2px solid rgba(245,166,35,.35);background:rgba(255,248,240,.96);font-size:14px;font-family:var(--body);color:var(--deep);cursor:pointer}
.t-count{font-size:12px;color:rgba(255,248,240,.45);margin-top:8px}
.t-card{overflow:hidden;cursor:pointer}
.t-ew{padding:26px;text-align:center}
.t-em{font-size:48px}
.t-body{padding:18px 20px 20px}
.t-name{font-family:var(--display);font-size:17px;font-weight:700;color:var(--maroon);margin-bottom:2px}
.t-hi{font-size:12px;color:var(--saffron);margin-bottom:7px}
.t-loc{font-size:12px;color:#666;margin-bottom:3px}
.t-de{font-size:12px;color:#555;margin-bottom:10px}
.t-desc{font-size:12px;color:#777;line-height:1.5;margin-bottom:14px}
.t-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
/* detail */
.td-hero{padding:44px 0 32px;color:var(--cream)}
.back-btn{background:rgba(255,248,240,.15);border:1px solid rgba(255,248,240,.3);color:var(--cream);padding:7px 15px;border-radius:20px;cursor:pointer;font-size:13px;font-family:var(--body);margin-bottom:18px;transition:var(--tr)}
.back-btn:hover{background:rgba(255,248,240,.25)}
.td-hc{display:flex;align-items:center;gap:22px}
.td-em{font-size:68px}
.td-t{font-family:var(--display);font-size:clamp(20px,4vw,36px);color:var(--cream);margin-bottom:4px}
.td-hi{font-size:16px;opacity:.78;margin-bottom:5px}
.td-loc{font-size:14px;opacity:.65}
.td-grid{display:grid;grid-template-columns:1fr 320px;gap:26px;margin-top:32px}
.dc{background:#fff;border-radius:var(--r);padding:20px 22px;margin-bottom:16px;border:1px solid var(--border)}
.dc h3{font-family:var(--display);font-size:15px;color:var(--maroon);margin-bottom:10px}
.dc p{font-size:14px;line-height:1.7;color:#555}
.tag-row{display:flex;flex-wrap:wrap;gap:7px}
.info-box{background:#fff;border-radius:var(--r);padding:18px 20px;margin-bottom:14px;border:1px solid var(--border)}
.info-box h3{font-family:var(--display);font-size:14px;color:var(--maroon);margin-bottom:12px}
.ir{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0e8e0}
.ir:last-child{border-bottom:none}
.ir-icon{font-size:15px;flex-shrink:0;margin-top:2px}
.ir-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.ir-val{font-size:13px;color:var(--deep);font-weight:600;margin-top:1px}
.d-cta{background:linear-gradient(135deg,var(--deep),var(--maroon-dark));border-radius:var(--r);padding:18px}
.l-badge{display:flex;align-items:center;gap:8px;color:#ef5350;font-size:13px;font-weight:600}

/* ── MANTRAS ── */
.m-cats{display:flex;gap:7px;flex-wrap:wrap;margin-top:18px}
.cat-b{padding:6px 15px;border-radius:20px;border:1px solid rgba(245,166,35,.3);background:transparent;color:rgba(255,248,240,.75);font-size:12px;font-family:var(--body);cursor:pointer;transition:var(--tr)}
.cat-b:hover,.cat-b.act{background:rgba(245,166,35,.2);color:var(--gold);border-color:rgba(245,166,35,.5)}
.m-layout{display:grid;grid-template-columns:280px 1fr;gap:22px;align-items:start}
.m-list-label{font-size:11px;font-weight:700;color:#999;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.mi{display:flex;align-items:center;gap:10px;padding:13px 15px;background:#fff;border-radius:var(--r);border:2px solid var(--border);cursor:pointer;transition:var(--tr);margin-bottom:7px}
.mi:hover{border-color:rgba(255,107,53,.4);transform:translateX(3px)}
.mi.act{border-color:var(--saffron);background:linear-gradient(135deg,#fff,var(--cream));box-shadow:var(--shadow)}
.mi-em{font-size:20px;flex-shrink:0}
.mi-n{font-family:var(--display);font-size:13px;font-weight:700;color:var(--maroon);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-d{font-size:11px;color:#999}
.mi-cat{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.m-detail{border-radius:20px;overflow:hidden;box-shadow:0 12px 48px rgba(139,26,26,.18);border:1px solid var(--border)}
.m-dh{padding:26px 26px 22px;display:flex;align-items:center;gap:18px;color:var(--cream)}
.m-dem{font-size:48px}
.m-dn{font-family:var(--display);font-size:22px;font-weight:700;margin-bottom:3px}
.m-dhi{font-size:14px;opacity:.78;margin-bottom:3px}
.m-dde{font-size:12px;opacity:.6}
.m-content{background:#fff;padding:26px}
.m-block{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid #f5ece0}
.m-block:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.bl{font-size:11px;font-weight:700;color:var(--saffron);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px}
.sk-block{background:linear-gradient(135deg,var(--cream),var(--cream2));border-radius:8px;padding:18px;margin:0 -26px 22px}
.sk-text{font-size:clamp(15px,2.5vw,19px);line-height:1.9;color:var(--deep);white-space:pre-line}
.tr-text{font-style:italic;color:var(--maroon-dark);font-size:14px;line-height:1.8;white-space:pre-line}
.me-text{font-size:15px;line-height:1.7;color:#444}
.ben-item{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:#555;line-height:1.5;margin-bottom:7px}
.pr-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.pr-item{background:var(--cream);border-radius:8px;padding:12px 14px;border:1px solid rgba(255,107,53,.15)}
.pr-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.pr-val{font-size:13px;color:var(--deep);font-weight:600}
.m-acts{display:flex;gap:9px;flex-wrap:wrap}

/* ── HOROSCOPE ── */
.v-toggle{display:flex;gap:7px;margin-top:16px}
.vb{padding:6px 17px;border-radius:20px;border:1px solid rgba(245,166,35,.3);background:transparent;color:rgba(255,248,240,.75);font-family:var(--body);font-size:13px;cursor:pointer;transition:var(--tr)}
.vb.act{background:rgba(245,166,35,.2);color:var(--gold);border-color:rgba(245,166,35,.5)}
.r-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:10px;margin-bottom:28px}
.r-card{background:#fff;border:2px solid var(--border);border-radius:var(--r);padding:15px 8px;text-align:center;cursor:pointer;transition:var(--tr)}
.r-card:hover{transform:translateY(-3px);border-color:rgba(255,107,53,.4)}
.r-card.act{background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;border-color:var(--saffron);box-shadow:var(--shadow)}
.r-sym{font-size:24px;margin-bottom:5px}
.r-name{font-family:var(--display);font-size:12px;font-weight:700}
.r-hi{font-size:11px;opacity:.7}
.r-lord{font-size:10px;opacity:.55;margin-top:2px}
.r-detail{background:#fff;border-radius:20px;border:1px solid var(--border);overflow:hidden;box-shadow:0 12px 40px rgba(139,26,26,.12)}
.rdh{background:linear-gradient(135deg,var(--cream),var(--cream2));padding:22px 26px;display:flex;align-items:center;gap:18px;border-bottom:1px solid var(--border)}
.rds{font-size:52px}
.rdh h2{font-family:var(--display);font-size:20px;color:var(--maroon);margin-bottom:3px}
.rd-trait{font-size:13px;color:var(--saffron);font-weight:600}
.rd-meta{font-size:11px;color:#999;margin-top:3px}
.rd-pred{padding:22px 26px;border-bottom:1px solid #f5ece0}
.pred-label{font-size:11px;font-weight:700;color:var(--saffron);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px}
.pred-txt{font-size:15px;line-height:1.75;color:#444}
.lucky-g{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#f5ece0}
.li{background:#fff;padding:16px 14px;display:flex;align-items:center;gap:9px}
.li-icon{font-size:18px}
.li-label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.li-val{font-size:14px;font-weight:700;color:var(--deep);margin-top:1px}
.sel-prompt{text-align:center;padding:56px;color:#999}

/* ── POOJA ── */
.g-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-top:18px}
.gtab{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:22px;border:1px solid rgba(245,166,35,.3);background:transparent;color:rgba(255,248,240,.75);font-family:var(--body);font-size:13px;cursor:pointer;transition:var(--tr)}
.gtab.act{background:rgba(245,166,35,.2);color:var(--gold);border-color:rgba(245,166,35,.5)}
.p-layout{display:grid;grid-template-columns:1fr 290px;gap:22px;align-items:start}
.p-hcard{display:flex;align-items:center;gap:18px;background:linear-gradient(135deg,var(--cream),var(--cream2));border-radius:var(--r);padding:22px;border:1px solid var(--border);margin-bottom:22px}
.p-em{font-size:48px}
.p-name{font-family:var(--display);font-size:20px;color:var(--maroon);margin-bottom:3px}
.p-hi{font-size:14px;color:var(--saffron);margin-bottom:9px}
.p-badges{display:flex;gap:7px;flex-wrap:wrap}
.steps-title{font-family:var(--display);font-size:17px;color:var(--maroon);margin-bottom:14px}
.step-c{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:var(--tr);margin-bottom:7px}
.step-c:hover{border-color:rgba(255,107,53,.35);box-shadow:0 2px 12px rgba(139,26,26,.07)}
.step-c.exp{border-color:var(--saffron);box-shadow:var(--shadow)}
.step-h{display:flex;align-items:center;gap:12px;padding:14px 16px}
.step-n{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-ic{font-size:18px}
.step-tt{flex:1;font-family:var(--display);font-size:14px;font-weight:700;color:var(--deep)}
.step-arr{color:var(--saffron);font-size:11px}
.step-body{padding:0 16px 16px 74px;font-size:13px;line-height:1.7;color:#555}
.mat-card{background:#fff;border-radius:var(--r);padding:20px;border:1px solid var(--border);margin-bottom:14px}
.mat-card h3{font-family:var(--display);font-size:15px;color:var(--maroon);margin-bottom:12px}
.mat-list{list-style:none}
.mat-item{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid #f5ece0;font-size:13px;color:#555}
.mat-item:last-child{border-bottom:none}
.mat-dot{width:7px;height:7px;border-radius:50%;background:var(--saffron);margin-top:5px;flex-shrink:0}
.tip-card{background:linear-gradient(135deg,var(--cream),var(--cream2));border-radius:var(--r);padding:18px;border:1px solid rgba(245,166,35,.3)}
.tip-card h4{font-family:var(--display);color:var(--maroon);margin-bottom:7px}
.tip-card p{font-size:13px;color:#666;line-height:1.6}

/* ── SACRED TEXTS ── */
.tx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
.tx-card{overflow:hidden;cursor:pointer}
.tx-ew{padding:22px;text-align:center}
.tx-em{font-size:44px}
.tx-body{padding:15px 18px 20px}
.tx-name{font-family:var(--display);font-size:17px;color:var(--maroon);margin-bottom:2px}
.tx-hi{font-size:12px;color:var(--saffron);margin-bottom:4px}
.tx-auth{font-size:12px;color:#999;margin-bottom:9px;font-style:italic}
.tx-desc{font-size:12px;color:#666;line-height:1.5;margin-bottom:11px}
.tx-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tx-verse{font-size:12px;color:var(--maroon);opacity:.65;padding-top:9px;border-top:1px solid #f5ece0}
.tx-d-grid{display:grid;grid-template-columns:1fr 270px;gap:22px;align-items:start;margin-top:26px}

/* ── FESTIVALS ── */
.fes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.fes-card{overflow:hidden;cursor:pointer}
.fes-em{font-size:44px;padding:22px;text-align:center;background:linear-gradient(135deg,var(--cream),var(--cream2))}
.fes-body{padding:16px 18px 20px}
.fes-name{font-family:var(--display);font-size:17px;color:var(--maroon);margin-bottom:2px}
.fes-hi{font-size:13px;color:var(--saffron);margin-bottom:7px}
.fes-month{font-size:12px;color:#666;margin-bottom:3px}
.fes-deity{font-size:12px;color:#666;margin-bottom:9px}
.fes-desc{font-size:13px;color:#555;line-height:1.55}

/* ── AI ── */
.ai-layout{display:grid;grid-template-columns:270px 1fr;gap:22px;align-items:start}
.q-label{font-size:11px;font-weight:700;color:var(--saffron);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px}
.q-list{display:flex;flex-direction:column;gap:5px;margin-bottom:22px}
.qb{text-align:left;background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:12px;color:#555;font-family:var(--body);cursor:pointer;transition:var(--tr);line-height:1.4}
.qb:hover:not(:disabled){background:var(--cream);border-color:rgba(255,107,53,.4);color:var(--maroon);transform:translateX(3px)}
.qb:disabled{opacity:.55;cursor:not-allowed}
.ai-feats{background:#fff;border-radius:var(--r);padding:16px;border:1px solid var(--border)}
.af-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
.afi{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#555;border-bottom:1px solid #f5ece0}
.afi:last-child{border-bottom:none}
.chat-win{background:#fff;border-radius:20px;border:1px solid var(--border);box-shadow:0 12px 48px rgba(139,26,26,.15);overflow:hidden;display:flex;flex-direction:column;height:680px}
.chat-hdr{background:linear-gradient(135deg,#1a0a05,var(--deep));padding:15px 20px;display:flex;align-items:center;gap:11px;flex-shrink:0}
.chat-av{width:40px;height:40px;background:linear-gradient(135deg,var(--saffron),var(--gold));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-nm{font-family:var(--display);color:var(--gold);font-size:15px}
.chat-st{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,248,240,.5);margin-top:2px}
.chat-clr{margin-left:auto;background:rgba(255,248,240,.1);border:1px solid rgba(255,248,240,.2);color:rgba(255,248,240,.6);padding:5px 11px;border-radius:16px;cursor:pointer;font-size:11px;font-family:var(--body);transition:var(--tr)}
.chat-clr:hover{background:rgba(255,248,240,.18);color:rgba(255,248,240,.9)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:16px;background:#FAFAFA}
.msg{display:flex;align-items:flex-start;gap:9px}
.msg.user{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;background:linear-gradient(135deg,var(--saffron),var(--gold));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.mb{max-width:78%}
.msg-t{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.65}
.msg.assistant .msg-t{background:#fff;color:var(--deep);border-radius:4px 18px 18px 18px;border:1px solid rgba(245,166,35,.2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.msg.user .msg-t{background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;border-radius:18px 4px 18px 18px;box-shadow:0 2px 12px rgba(255,107,53,.28)}
.typing{display:flex;gap:5px;padding:3px 0}
.typing span{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
.chat-inp-a{display:flex;gap:9px;padding:14px 18px;border-top:1px solid var(--border);background:var(--cream);flex-shrink:0}
.chat-inp{flex:1;padding:11px 17px;border-radius:28px;border:2px solid rgba(245,166,35,.3);background:#fff;font-size:14px;font-family:var(--body);color:var(--deep);transition:border-color .2s}
.chat-inp:focus{border-color:rgba(255,107,53,.5)}
.send-btn{padding:11px 20px;font-size:14px}

/* ── FOOTER ── */
.footer{background:linear-gradient(160deg,#1a0a05,var(--deep));color:var(--cream);margin-top:72px}
.ft-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;padding:48px 0 36px;border-bottom:1px solid rgba(245,166,35,.13)}
.ft-logo{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.ft-om{font-size:30px}
.ft-name{font-family:var(--display);font-size:19px;font-weight:700;color:var(--gold)}
.ft-tag{font-size:11px;color:rgba(255,248,240,.45);margin-top:2px}
.ft-desc{font-size:13px;line-height:1.7;color:rgba(255,248,240,.55);margin-bottom:18px;max-width:320px}
.ft-col-t{font-family:var(--display);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.ft-lnk{display:block;background:transparent;border:none;color:rgba(255,248,240,.5);font-size:14px;font-family:var(--body);padding:4px 0;cursor:pointer;text-align:left;transition:color .2s}
.ft-lnk:hover{color:var(--gold)}
.ft-bot{padding:18px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px}
.ft-shloka{font-size:13px;color:rgba(255,248,240,.35);font-style:italic}
.ft-copy{font-size:12px;color:rgba(255,248,240,.28)}

/* ── DARK MODE ── */
body.dark{background:#1a0f0a;color:#FFF8F0}
body.dark .card{background:#231510;border-color:rgba(245,166,35,.15)}
body.dark .chat-win{background:#1e1208}
body.dark .chat-msgs{background:#160d08}
body.dark .msg.assistant .msg-t{background:#231510;color:#FFF8F0;border-color:rgba(245,166,35,.15)}
body.dark .chat-inp-a{background:#1a0f0a;border-color:rgba(245,166,35,.2)}
body.dark .chat-inp{background:#231510;color:#FFF8F0;border-color:rgba(245,166,35,.25)}
body.dark .s-inp,body.dark .s-sel{background:#231510;color:#FFF8F0;border-color:rgba(245,166,35,.3)}
body.dark .mi{background:#231510;border-color:rgba(245,166,35,.15)}
body.dark .mi.act{background:#2e1c14;border-color:var(--saffron)}
body.dark .dc,body.dark .info-box,body.dark .mat-card,body.dark .ai-feats,body.dark .r-card{background:#231510;border-color:rgba(245,166,35,.15)}
body.dark .qb{background:#231510;border-color:rgba(245,166,35,.15);color:#d4c5b0}
body.dark .step-c{background:#231510;border-color:rgba(245,166,35,.12)}
body.dark .tip-card{background:#2e1c14}
body.dark .pr-item{background:#2e1c14}
body.dark .rdh{background:linear-gradient(135deg,#2e1c14,#231510)}
body.dark .sk-block{background:linear-gradient(135deg,#2e1c14,#231510)}
body.dark .hero-inp{background:rgba(30,18,8,.95);color:#FFF8F0}
body.dark .p-hcard{background:linear-gradient(135deg,#2e1c14,#231510)}
body.dark .li{background:#231510}
body.dark .fes-detail{background:linear-gradient(135deg,#2e1c14,#231510)}
body.dark .vCard{background:#2e1c14}

/* ── SCROLL TO TOP ── */
.scroll-top{position:fixed;bottom:28px;right:28px;width:46px;height:46px;background:linear-gradient(135deg,var(--saffron),var(--gold));border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 4px 18px rgba(255,107,53,.4);transition:var(--tr);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(20px);pointer-events:none}
.scroll-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-top:hover{transform:translateY(-3px) !important;box-shadow:0 8px 24px rgba(255,107,53,.5)}

/* ── DARK MODE TOGGLE ── */
.dm-btn{background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);color:var(--gold);padding:6px 12px;border-radius:20px;cursor:pointer;font-size:13px;transition:var(--tr);flex-shrink:0;font-family:var(--body)}
.dm-btn:hover{background:rgba(245,166,35,.22)}

/* ── TOAST NOTIFICATION ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--deep),var(--maroon-dark));color:var(--cream);padding:11px 22px;border-radius:30px;font-size:14px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;box-shadow:var(--shadow);border:1px solid rgba(245,166,35,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PANCHANG WIDGET ── */
.panch{background:linear-gradient(135deg,#1a0a05,var(--deep));border-radius:20px;padding:24px;color:var(--cream);margin-bottom:28px}
.panch-title{font-family:var(--display);font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.panch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.panch-item{background:rgba(255,248,240,.07);border-radius:10px;padding:11px 13px;border:1px solid rgba(245,166,35,.15)}
.panch-label{font-size:10px;color:rgba(255,248,240,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.panch-val{font-size:13px;color:var(--cream);font-weight:600}

/* ── MANTRA JAPA COUNTER ── */
.mala-wrap{background:linear-gradient(135deg,var(--cream),var(--cream2));border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:14px;text-align:center}
.mala-count{font-family:var(--display);font-size:52px;font-weight:900;color:var(--maroon);line-height:1}
.mala-sub{font-size:12px;color:#999;margin-top:4px;margin-bottom:14px}
.mala-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* ── FESTIVAL DETAIL ── */
.fes-detail{padding:18px 18px 20px;border-top:1px solid var(--border);background:linear-gradient(135deg,var(--cream),var(--cream2));animation:fadeUp .3s ease forwards}

/* ── HERO BADGE ── */
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:5px 14px;font-size:12px;color:rgba(255,248,240,.8);margin-bottom:18px}

/* ── CHAR DHAM BADGE ── */
.char-dham{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(245,166,35,.15),rgba(255,107,53,.1));border:1px solid rgba(245,166,35,.3);border-radius:14px;padding:4px 11px;font-size:11px;font-weight:700;color:var(--maroon);margin-bottom:8px}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:linear-gradient(135deg,var(--deep),var(--maroon-dark));border-radius:16px;padding:22px 20px;color:var(--cream);border:1px solid rgba(245,166,35,.2);display:flex;align-items:center;gap:16px}
.stat-icon{font-size:32px;flex-shrink:0}
.stat-num{font-family:var(--display);font-size:26px;font-weight:900;color:var(--gold);line-height:1}
.stat-lbl{font-size:12px;color:rgba(255,248,240,.5);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

/* ── THEME CUSTOMIZER PANEL ── */
.theme-panel{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:300;display:flex;flex-direction:column;gap:0}
.theme-tab{background:linear-gradient(135deg,var(--deep),var(--maroon-dark));border:none;border-radius:0 10px 10px 0;padding:10px 8px;cursor:pointer;color:var(--gold);font-size:18px;writing-mode:vertical-rl;letter-spacing:1px;font-family:var(--display);font-size:11px;border-left:3px solid var(--gold);transition:var(--tr)}
.theme-tab:hover{background:var(--maroon)}
.theme-drawer{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:299;background:linear-gradient(160deg,#1a0a05,var(--deep));border-radius:0 18px 18px 0;padding:20px 16px;box-shadow:4px 0 32px rgba(139,26,26,.35);border-right:1px solid rgba(245,166,35,.2);width:200px;transition:all .3s cubic-bezier(.4,0,.2,1)}
.theme-drawer.closed{transform:translateY(-50%) translateX(-200px)}
.th-title{font-family:var(--display);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.th-section{margin-bottom:16px}
.th-label{font-size:10px;color:rgba(255,248,240,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.th-colors{display:flex;flex-wrap:wrap;gap:7px}
.th-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:var(--tr);flex-shrink:0}
.th-swatch.act{border-color:#fff;transform:scale(1.15)}
.th-swatch:hover{transform:scale(1.1)}
.th-fonts{display:flex;flex-direction:column;gap:6px}
.th-font-btn{background:rgba(255,248,240,.07);border:1px solid rgba(245,166,35,.15);color:rgba(255,248,240,.75);padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;text-align:left;transition:var(--tr)}
.th-font-btn.act{background:rgba(245,166,35,.18);border-color:rgba(245,166,35,.45);color:var(--gold)}
.th-font-btn:hover{background:rgba(245,166,35,.12)}

/* ── MEDITATION / CHANT MODE ── */
.med-overlay{position:fixed;inset:0;z-index:500;background:radial-gradient(ellipse at center,#1a0505 0%,#0d0000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.med-close{position:absolute;top:20px;right:24px;background:rgba(255,248,240,.1);border:1px solid rgba(255,248,240,.2);color:var(--cream);width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;transition:var(--tr)}
.med-close:hover{background:rgba(255,248,240,.2)}
.med-om{font-family:var(--dev);font-size:clamp(80px,15vw,160px);color:rgba(245,166,35,.15);animation:float 4s ease-in-out infinite;line-height:1;margin-bottom:10px}
.med-name{font-family:var(--display);font-size:clamp(18px,3vw,32px);font-weight:900;color:var(--gold);text-align:center;margin-bottom:6px}

.med-btn.primary{width:72px;height:72px;background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;font-size:28px;border:none;box-shadow:0 0 32px rgba(255,107,53,.4)}

.med-count-sub{font-size:13px;color:rgba(255,248,240,.4);text-align:center;margin-top:4px}
.med-timer{font-size:28px;font-family:var(--display);color:rgba(255,248,240,.6);letter-spacing:2px;min-width:90px;text-align:center}
.med-ring{width:120px;height:120px;position:relative;margin:0 auto 8px}

.med-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.97)}}
.med-pulsing{animation:pulse 2s ease-in-out infinite}
.med-speed{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap;justify-content:center}
.med-speed-btn{background:rgba(255,248,240,.08);border:1px solid rgba(245,166,35,.2);color:rgba(255,248,240,.6);padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;transition:var(--tr);font-family:var(--body)}
.med-speed-btn.act{background:rgba(245,166,35,.2);color:var(--gold);border-color:rgba(245,166,35,.4)}

.blog-cat-tag{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.45);color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.5px}
.blog-body{padding:18px 20px 22px}
.blog-title{font-family:var(--display);font-size:17px;color:var(--maroon);margin-bottom:7px;line-height:1.35}
.blog-excerpt{font-size:13px;color:#666;line-height:1.6;margin-bottom:12px}
.blog-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:#999}
.blog-read-time{display:flex;align-items:center;gap:4px}
.blog-detail-hero{background:linear-gradient(135deg,var(--deep),var(--maroon-dark));padding:44px 0 32px;color:var(--cream)}
.blog-content{font-size:15px;line-height:1.85;color:#444;max-width:720px}
.blog-content h2{font-family:var(--display);font-size:20px;color:var(--maroon);margin:24px 0 10px}
.blog-content p{margin-bottom:16px}
.blog-content blockquote{border-left:3px solid var(--saffron);padding:12px 18px;background:var(--cream2);border-radius:0 8px 8px 0;margin:16px 0;font-style:italic;color:var(--maroon-dark)}

.trend-list{display:flex;flex-direction:column;gap:10px}

.trend-rank{font-family:var(--display);font-size:22px;font-weight:900;color:var(--saffron);min-width:36px}

.mi:hover::before,.mi.act::before{transform:scaleY(1)}
.mi:hover{border-color:rgba(255,107,53,.4);transform:translateX(3px)}
.mi.act{border-color:var(--saffron);background:linear-gradient(135deg,#fff,var(--cream));box-shadow:var(--shadow)}

.mi-fav:hover{transform:scale(1.3)}
body.dark .mi{background:#231510;border-color:rgba(245,166,35,.15)}
body.dark .mi.act{background:#2e1c14}

/* ── FAVORITES ── */
.fav-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,107,53,.1);color:#E65100;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}

.sk-line{display:block;padding:3px 8px;border-radius:6px;transition:all .3s;cursor:default;line-height:2;border-left:3px solid transparent}

.sk-line-done{color:rgba(44,24,16,.38)}
.sk-line:not(.sk-line-active):not(.sk-line-done){color:var(--deep)}
.audio-line-player{background:linear-gradient(135deg,var(--deep),var(--maroon-dark));border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid rgba(245,166,35,.25)}
.alp-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.alp-wave{display:flex;align-items:center;gap:3px;height:20px}

.vod-card{background:linear-gradient(135deg,var(--deep),var(--maroon-dark));border-radius:20px;padding:28px;color:var(--cream);text-align:center;border:1px solid rgba(245,166,35,.25);position:relative;overflow:hidden}
.vod-card::before{content:'ॐ';position:absolute;right:-10px;top:-10px;font-size:120px;color:rgba(245,166,35,.05);font-family:var(--dev)}
.vod-label{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.vod-text{font-family:var(--dev);font-size:clamp(15px,2.5vw,20px);color:var(--cream);line-height:1.85;margin-bottom:12px}
.vod-meaning{font-size:14px;color:rgba(255,248,240,.68);font-style:italic;max-width:560px;margin:0 auto 8px;line-height:1.6}
.vod-src{font-size:12px;color:var(--gold);opacity:.7}

  {id:1,name:"Gayatri Mantra",hindi:"गायत्री मंत्र",deity:"Surya",cat:"Universal",em:"☀️",col:"#F57F17",
  text:"ॐ भूर्भुवः स्वः\nतत्सवितुर्वरेण्यं\nभर्गो देवस्य धीमहि\nधियो यो नः प्रचोदयात्।",

  {id:2,name:"Maha Mrityunjaya",hindi:"महामृत्युंजय मंत्र",deity:"Lord Shiva",cat:"Healing",em:"🔱",col:"#4A148C",
  text:"ॐ त्र्यम्बकं यजामहे\nसुगन्धिं पुष्टिवर्धनम्।\nउर्वारुकमिव बन्धनान्\nमृत्योर्मुक्षीय मामृतात्।।",

  {id:4,name:"Hanuman Chalisa",hindi:"हनुमान चालीसा",deity:"Lord Hanuman",cat:"Protection",em:"🐒",col:"#BF360C",
  text:"॥ दोहा ॥\nश्रीगुरु चरन सरोज रज, निज मनु मुकुरु सुधारि।\nबरनउँ रघुबर बिमल जसु, जो दायकु फल चारि।।\nबुद्धिहीन तनु जानिके, सुमिरौं पवन-कुमार।\nबल बुद्धि विद्या देहु मोहिं, हरहु कलेस विकार।।\n\n॥ चौपाई ॥\nजय हनुमान ज्ञान गुण सागर।\nजय कपीस तिहुँ लोक उजागर।।1।।\n\nराम दूत अतुलित बल धामा।\nअञ्जनि पुत्र पवन सुत नामा।।2।।\n\nमहावीर विक्रम बजरंगी।\nकुमति निवार सुमति के संगी।।3।।\n\nकञ्चन बरन बिराज सुबेसा।\nकानन कुण्डल कुञ्चित केसा।।4।।\n\nहाथ बज्र औ ध्वजा बिराजे।\nकाँधे मूँज जनेऊ साजे।।5।।\n\nशंकर सुवन केसरी नंदन।\nतेज प्रताप महा जग बंदन।।6।।\n\nविद्यावान गुनी अति चातुर।\nराम काज करिबे को आतुर।।7।।\n\nप्रभु चरित्र सुनिबे को रसिया।\nराम लखन सीता मन बसिया।।8।।\n\nसूक्ष्म रूप धरि सियहिं दिखावा।\nबिकट रूप धरि लंक जरावा।।9।।\n\nभीम रूप धरि असुर सँहारे।\nरामचन्द्र के काज सँवारे।।10।।\n\nलाय सँजीवन लखन जियाये।\nश्रीरघुबीर हरषि उर लाये।।11।।\n\nरघुपति कीन्हीं बहुत बड़ाई।\nतुम मम प्रिय भरतहि सम भाई।।12।।\n\nसहस बदन तुम्हरो जस गावैं।\nअस कहि श्रीपति कण्ठ लगावैं।।13।।\n\nसनकादिक ब्रह्मादि मुनीसा।\nनारद सारद सहित अहीसा।।14।।\n\nजम कुबेर दिगपाल जहाँ ते।\nकवि कोबिद कहि सकैं कहाँ ते।।15।।\n\nतुम उपकार सुग्रीवहिं कीन्हा।\nराम मिलाय राजपद दीन्हा।।16।।\n\nतुम्हरो मंत्र विभीषण माना।\nलंकेश्वर भए सब जग जाना।।17।।\n\nजुग सहस्र जोजन पर भानू।\nलील्यो ताहि मधुर फल जानू।।18।।\n\nप्रभु मुद्रिका मेलि मुख माहीं।\nजलधि लाँघि गये अचरज नाहीं।।19।।\n\nदुर्गम काज जगत के जेते।\nसुगम अनुग्रह तुम्हरे तेते।।20।।\n\nराम दुआरे तुम रखवारे।\nहोत न आज्ञा बिनु पैसारे।।21।।\n\nसब सुख लहैं तुम्हारी सरना।\nतुम रक्षक काहू को डर ना।।22।।\n\nआपन तेज सम्हारो आपे।\nतीनों लोक हाँक ते काँपे।।23।।\n\nभूत पिशाच निकट नहिं आवे।\nमहावीर जब नाम सुनावे।।24।।\n\nनासे रोग हरे सब पीरा।\nजपत निरन्तर हनुमत बीरा।।25।।\n\nसंकट से हनुमान छुड़ावे।\nमन क्रम बचन ध्यान जो लावे।।26।।\n\nसब पर राम तपस्वी राजा।\nतिनके काज सकल तुम साजा।।27।।\n\nऔर मनोरथ जो कोई लावे।\nसोइ अमित जीवन फल पावे।।28।।\n\nचारों जुग परताप तुम्हारा।\nहै परसिद्ध जगत उजियारा।।29।।\n\nसाधु संत के तुम रखवारे।\nअसुर निकंदन राम दुलारे।।30।।\n\nअष्ट सिद्धि नव निधि के दाता।\nअस बर दीन जानकी माता।।31।।\n\nराम रसायन तुम्हरे पासा।\nसदा रहो रघुपति के दासा।।32।।\n\nतुम्हरे भजन राम को पावे।\nजनम जनम के दुख बिसरावे।।33।।\n\nअन्तकाल रघुबर पुर जाई।\nजहाँ जन्म हरिभक्त कहाई।।34।।\n\nऔर देवता चित्त न धरई।\nहनुमत सेइ सर्व सुख करई।।35।।\n\nसंकट कटे मिटे सब पीरा।\nजो सुमिरै हनुमत बलबीरा।।36।।\n\nजय जय जय हनुमान गोसाईं।\nकृपा करहु गुरुदेव की नाईं।।37।।\n\nजो सत बार पाठ कर कोई।\nछूटहि बंदि महा सुख होई।।38।।\n\nजो यह पड़े हनुमान चालीसा।\nहोय सिद्धि साखी गौरीसा।।39।।\n\nतुलसीदास सदा हरि चेरा।\nकीजे नाथ हृदय महँ डेरा।।40।।\n\n॥ दोहा ॥\nपवन तनय संकट हरण, मंगल मूरति रूप।\nराम लखन सीता सहित, हृदय बसहु सुर भूप।।",
  roman:"॥ Doha ॥\nShri Guru Charan Saroj Raj, Nij Manu Mukuru Sudhari\nBarnaun Raghubar Bimal Jasu, Jo Dayaku Phal Chari\nBuddhiheen Tanu Janike, Sumiron Pavan-Kumar\nBal Buddhi Vidya Dehu Mohin, Harahu Kales Vikar\n\n॥ Chaupai ॥\nJai Hanuman Gyan Gun Sagar\nJai Kapis Tihu Lok Ujagar ॥1॥\n\nRam Doot Atulit Bal Dhama\nAnjani Putra Pavan Sut Nama ॥2॥\n\nMahavir Vikram Bajrangi\nKumati Nivar Sumati Ke Sangi ॥3॥\n\nKanchan Baran Biraj Subesa\nKanan Kundal Kunchit Kesa ॥4॥\n\nHath Bajra Au Dhwaja Biraje\nKandhe Munj Janeu Saje ॥5॥\n\nShankar Suvan Kesari Nandan\nTej Pratap Maha Jag Bandan ॥6॥\n\nVidyavan Guni Ati Chatur\nRam Kaj Karibe Ko Atur ॥7॥\n\nPrabhu Charitra Sunibe Ko Rasiya\nRam Lakhan Sita Man Basiya ॥8॥\n\nSukshm Roop Dhari Siyahin Dikhava\nBikat Roop Dhari Lanka Jarava ॥9॥\n\nBheem Roop Dhari Asur Sanhare\nRamchandra Ke Kaj Saware ॥10॥\n\nLay Sanjeevan Lakhan Jiyaye\nShri Raghubir Harashi Ur Laye ॥11॥\n\nRaghupati Kinhi Bahut Badai\nTum Mam Priya Bharatahi Sam Bhai ॥12॥\n\nSahas Badan Tumharo Jas Gaven\nAs Kahi Shripati Kanth Lagaven ॥13॥\n\nSankadik Brahmadi Munisa\nNarad Sarad Sahit Ahisa ॥14॥\n\nJam Kuber Digpal Jahan Te\nKavi Kobid Kahi Saken Kahan Te ॥15॥\n\nTum Upkar Sugrivahin Linha\nRam Milay Rajpad Linha ॥16॥\n\nTumharo Mantra Vibhishan Mana\nLankeshwar Bhaye Sab Jag Jana ॥17॥\n\nJug Sahastra Jojan Par Bhanu\nLeelyo Tahi Madhur Phal Janu ॥18॥\n\nPrabhu Mudrika Meli Mukh Mahin\nJaladhi Langhi Gaye Acharaj Nahin ॥19॥\n\nDurgam Kaj Jagat Ke Jete\nSugam Anugraha Tumhare Tete ॥20॥\n\nRam Duare Tum Rakhware\nHot Na Agya Binu Paisare ॥21॥\n\nSab Sukh Lahen Tumhari Sarna\nTum Rakshak Kahu Ko Dar Na ॥22॥\n\nApan Tej Samharo Ape\nTinon Lok Hank Te Kanpe ॥23॥\n\nBhoot Pishach Nikat Nahin Ave\nMahavir Jab Naam Sunave ॥24॥\n\nNase Rog Hare Sab Pira\nJapat Nirantar Hanumat Bira ॥25॥\n\nSankat Se Hanuman Chhudave\nMan Kram Bachan Dhyan Jo Lave ॥26॥\n\nSab Par Ram Tapasvi Raja\nTinke Kaj Sakal Tum Saja ॥27॥\n\nAur Manorath Jo Koi Lave\nSoi Amit Jeevan Phal Pave ॥28॥\n\nCharon Jug Partap Tumhara\nHai Parsidh Jagat Ujiyara ॥29॥\n\nSadhu Sant Ke Tum Rakhware\nAsur Nikandan Ram Dulare ॥30॥\n\nAsht Siddhi Nav Nidhi Ke Data\nAs Bar Deen Janaki Mata ॥31॥\n\nRam Rasayan Tumhare Pasa\nSada Raho Raghupati Ke Dasa ॥32॥\n\nTumhare Bhajan Ram Ko Pave\nJanam Janam Ke Dukh Bisrave ॥33॥\n\nAntkaal Raghubar Pur Jai\nJahan Janam Haribhakt Kahai ॥34॥\n\nAur Devta Chitt Na Dharai\nHanumat Sei Sarv Sukh Karai ॥35॥\n\nSankat Kate Mite Sab Pira\nJo Sumirai Hanumat Balbira ॥36॥\n\nJai Jai Jai Hanuman Gosain\nKripa Karahu Gurudev Ki Nain ॥37॥\n\nJo Sat Bar Path Kar Koi\nChhutehi Bandi Maha Sukh Hoi ॥38॥\n\nJo Yeh Padhe Hanuman Chalisa\nHoy Siddhi Sakhi Gaurisa ॥39॥\n\nTulasidas Sada Hari Chera\nKije Nath Hriday Mahan Dera ॥40॥\n\n॥ Doha ॥\nPavan Tanay Sankat Haran, Mangal Murti Roop\nRam Lakhan Sita Sahit, Hriday Basahu Sur Bhup",
  meaning:"The complete Hanuman Chalisa by Saint Tulsidas — 40 divine verses glorifying Lord Hanuman, the ocean of knowledge, strength, and devotion, who is the eternal servant of Lord Rama.",
  benefits:["Removes evil spirits and negative energy","Gives immense physical and mental strength","Protects from all dangers","Fulfills all heartfelt desires"],
  time:"Tuesday and Saturday mornings",reps:"Once or 3/7/11 times"},

  {id:5,name:"Saraswati Vandana",hindi:"सरस्वती वंदना",deity:"Goddess Saraswati",cat:"Knowledge",em:"🎵",col:"#006064",
  text:"या कुन्देन्दुतुषारहारधवला\nया शुभ्रवस्त्रावृता।\nया वीणावरदण्डमण्डितकरा\nया श्वेतपद्मासना।।\n\nया ब्रह्माच्युत शंकरप्रभृतिभिः\nदेवैः सदा वंदिता।\nसा मां पातु सरस्वती\nभगवती निःशेषजाड्यापहा।।\n\nशुक्लां ब्रह्मविचारसारपरमां\nआद्यां जगद्व्यापिनीम्।\nवीणा पुस्तकधारिणीम् अभयदां\nजाड्यान्धकारापहाम्।।\n\nहस्ते स्फटिकमालिकां विदधतीं\nपद्मासने संस्थिताम्।\nवन्दे तां परमेश्वरीं भगवतीं\nबुद्धिप्रदां शारदाम्।।",
  roman:"Ya Kundendutushara Hara Dhavala\nYa Shubhravastravrita\nYa Vina Varadanda Manditakara\nYa Shvetapadmasana\n\nYa Brahmaachyuta Shankaraprabhriti-bhih\nDevaih Sada Vandita\nSa Mam Patu Saraswati\nBhagavati Nihsheshjadyapaha\n\nShuklan Brahmavicharasara-paramam\nAdyam Jagadvyapineem\nVeena Pustakadharineem Abhayadam\nJadyandhakara-apaham\n\nHaste Sphatikamalikaṃ Vidadhatim\nPadmasane Samsthitam\nVande Tam Parameshvarim Bhagavatim\nBuddhipradam Sharadam",
  meaning:"She who is white as the jasmine flower, as the moon, as pure as the white garland of snow — seated on a white lotus, holding the veena and bestowing boons — may that Goddess Saraswati protect me and remove all ignorance.",
  benefits:["Enhances learning and memory power","Removes obstacles in education","Gives clarity of speech and thought","Blesses with artistic and creative abilities"],
  time:"Before studies, Vasant Panchami",reps:"21 or 108 times"},

  {id:6,name:"Shri Lakshmi Aarti",hindi:"श्री लक्ष्मी आरती",deity:"Goddess Lakshmi",cat:"Prosperity",em:"💛",col:"#F9A825",
  text:"ॐ जय लक्ष्मी माता,\nमैया जय लक्ष्मी माता।\nतुमको निसदिन सेवत,\nहरि विष्णु विधाता।।\nॐ जय लक्ष्मी माता।।\n\nउमा रमा ब्रह्माणी,\nतुम ही जग माता।\nसूर्य चन्द्रमा ध्यावत,\nनारद ऋषि गाता।।\nॐ जय लक्ष्मी माता।।\n\nदुर्गा रूप निरंजनी,\nसुख सम्पत्ति दाता।\nजो कोई तुमको ध्यावत,\nऋद्धि सिद्धि धन पाता।।\nॐ जय लक्ष्मी माता।।\n\nतुम पाताल निवासिनी,\nतुम ही शुभ दाता।\nकर्म प्रभाव प्रकाशिनी,\nभवनिधि की त्राता।।\nॐ जय लक्ष्मी माता।।\n\nजिस घर में तुम रहतीं,\nसब सद्गुण आता।\nसब सम्भव हो जाता,\nमन नहीं घबराता।।\nॐ जय लक्ष्मी माता।।\n\nतुम बिन यज्ञ न होते,\nवस्त्र न कोई पाता।\nखान पान का वैभव,\nसब तुमसे आता।।\nॐ जय लक्ष्मी माता।।\n\nशुभ गुण मंदिर सुन्दर,\nक्षीरोदधि जाता।\nरत्न चतुर्दश तुमबिन,\nकोई नहीं पाता।।\nॐ जय लक्ष्मी माता।।\n\nमहालक्ष्मी जी की आरती,\nजो कोई नर गाता।\nउर आनन्द समाता,\nपाप उतर जाता।।\nॐ जय लक्ष्मी माता।।",
  roman:"Om Jai Lakshmi Mata\nMaiya Jai Lakshmi Mata\nTumko Nisdin Sevat\nHari Vishnu Vidhata\nOm Jai Lakshmi Mata\n\nUma Rama Brahmani\nTum Hi Jag Mata\nSurya Chandrama Dhyavat\nNarad Rishi Gata\nOm Jai Lakshmi Mata\n\nDurga Roop Niranjani\nSukh Sampatti Data\nJo Koi Tumko Dhyavat\nRiddhi Siddhi Dhan Pata\nOm Jai Lakshmi Mata\n\nTum Patal Nivasini\nTum Hi Shubh Data\nKarm Prabhav Prakashini\nBhavnidhi Ki Trata\nOm Jai Lakshmi Mata\n\nJis Ghar Mein Tum Rehti\nSab Sadgun Aata\nSab Sambhav Ho Jaata\nMan Nahi Ghabrata\nOm Jai Lakshmi Mata\n\nTum Bin Yagya Na Hote\nVastra Na Koi Pata\nKhan Pan Ka Vaibhav\nSab Tumse Aata\nOm Jai Lakshmi Mata\n\nShubh Gun Mandir Sundar\nKshirodadhi Jaata\nRatan Chaturdash Tumbin\nKoi Nahi Paata\nOm Jai Lakshmi Mata\n\nMahalakshmi Ji Ki Aarti\nJo Koi Nar Gaata\nUr Anand Samaata\nPaap Utar Jaata\nOm Jai Lakshmi Mata",
  meaning:"Complete Aarti of Goddess Lakshmi — praising her as the mother of the universe, the bestower of wealth, prosperity, and all good fortune. Chanting this with devotion removes all sins and fills the heart with divine joy.",
  benefits:["Attracts wealth and material prosperity","Removes financial difficulties","Brings success in business ventures","Grants material and spiritual abundance"],
  time:"Friday evenings, Diwali, daily evening aarti",reps:"Once daily during aarti"},

  {id:7,name:"Ganesh Aarti",hindi:"गणेश आरती",deity:"Lord Ganesha",cat:"Success",em:"🐘",col:"#BF360C",
  text:"जय गणेश जय गणेश जय गणेश देवा।\nमाता जाकी पार्वती, पिता महादेवा।।\nजय गणेश देवा।।\n\nएकदन्त दयावंत, चार भुजाधारी।\nमाथे पर सिन्दूर सोहे, मूषे की सवारी।।\nजय गणेश देवा।।\n\nअन्धन को आँख देत, कोढ़िन को काया।\nबाँझन को पुत्र देत, निर्धन को माया।।\nजय गणेश देवा।।\n\n'सुर' श्याम शरण आए, सफल कीजे सेवा।\nमाता जाकी पार्वती, पिता महादेवा।।\nजय गणेश देवा।।\n\nदीनन की लाज रखो, शम्भु सुतकारी।\nकामना को पूर्ण करो, जाऊँ बलिहारी।।\nजय गणेश देवा।।\n\nॐ गं गणपतये नमः।\nवक्रतुण्ड महाकाय,\nसूर्यकोटि समप्रभ।\nनिर्विघ्नं कुरु मे देव,\nसर्वकार्येषु सर्वदा।।",
  roman:"Jai Ganesh Jai Ganesh Jai Ganesh Deva\nMata Jaki Parvati Pita Mahadeva\nJai Ganesh Deva\n\nEkdant Dayavant Char Bhujadhari\nMathe Par Sindoor Sohe Mouse Ki Sawari\nJai Ganesh Deva\n\nAndhan Ko Ankh Det Kodhin Ko Kaya\nBanjon Ko Putra Det Nirdhan Ko Maya\nJai Ganesh Deva\n\nSur Shyam Sharan Aaye Saphal Kije Seva\nMata Jaki Parvati Pita Mahadeva\nJai Ganesh Deva\n\nDeenan Ki Laaj Rakho Shambhu Sutakari\nKamana Ko Poorn Karo Jaun Balihari\nJai Ganesh Deva\n\nOm Gam Ganapataye Namah\nVakratunda Mahakaya\nSuryakoti Samaprabha\nNirvighnam Kuru Me Deva\nSarvakaryeshu Sarvada",
  meaning:"Complete Aarti of Lord Ganesha — glorifying the single-tusked, four-armed son of Parvati and Shiva who rides a mouse, gives sight to the blind, wealth to the poor, and fulfills all desires of his devotees.",
  benefits:["Removes all obstacles (Vighna Nashak)","Grants success in new ventures","Blesses with wisdom and intellect","Ideal before starting any new work"],
  time:"Morning pooja, before any new work, Wednesdays, Ganesh Chaturthi",reps:"Once at start of pooja"},

  {id:8,name:"Shiv Aarti",hindi:"शिव आरती",deity:"Lord Shiva",cat:"Devotion",em:"🕉️",col:"#4A148C",
  text:"ॐ जय शिव ओंकारा,\nस्वामी जय शिव ओंकारा।\nब्रह्मा विष्णु सदाशिव,\nअर्द्धांगी धारा।।\nॐ जय शिव ओंकारा।।\n\nएकानन चतुरानन, पञ्चानन राजे।\nहंसासन गरुडासन, वृषवाहन साजे।।\nॐ जय शिव ओंकारा।।\n\nदो भुज चार चतुर्भुज, दसभुज ते सोहे।\nत्रिगुण रूप निरखते, त्रिभुवन जन मोहे।।\nॐ जय शिव ओंकारा।।\n\nअक्षमाला बनमाला, रुण्डमाला धारी।\nचन्दन मृगमद सोहे, भाले शशिधारी।।\nॐ जय शिव ओंकारा।।\n\nश्वेताम्बर पीताम्बर, बाघम्बर अंगे।\nसनकादिक गरुणादिक, भूतादिक संगे।।\nॐ जय शिव ओंकारा।।\n\nकर के मध्य कमण्डलु, चक्र त्रिशूल धर्ता।\nजगकर्ता जगभर्ता, जगसंहारकर्ता।।\nॐ जय शिव ओंकारा।।\n\nब्रह्मा विष्णु सदाशिव, जानत अविवेका।\nप्रणवाक्षर के मध्ये, ये तीनों एका।।\nॐ जय शिव ओंकारा।।\n\nत्रिगुण शिवजी की आरती, जो कोई नर गावे।\nकहत शिवानन्द स्वामी, मनवांछित फल पावे।।\nॐ जय शिव ओंकारा।।",
  roman:"Om Jai Shiv Onkara\nSwami Jai Shiv Onkara\nBrahma Vishnu Sadashiv\nArdhangee Dhara\nOm Jai Shiv Onkara\n\nEkanan Chaturanan Panchanan Raje\nHansasan Garudasan Vrishvahan Saje\nOm Jai Shiv Onkara\n\nDo Bhuj Char Chaturbhuj Dasbhuj Te Sohe\nTrigun Roop Nirkhat Tribhuvan Jan Mohe\nOm Jai Shiv Onkara\n\nAkshamala Banmala Rundamala Dhari\nChandan Mrigamad Sohe Bhale Shashidhari\nOm Jai Shiv Onkara\n\nShvetambar Pitambar Baghambar Ange\nSankadik Garunadik Bhutadik Sange\nOm Jai Shiv Onkara\n\nKar Ke Madhya Kamandalu Chakra Trishul Dharta\nJagkarta Jagbharta Jagsanharkarta\nOm Jai Shiv Onkara\n\nBrahma Vishnu Sadashiv Janat Aviveka\nPranavakshar Ke Madhye Ye Tinon Eka\nOm Jai Shiv Onkara\n\nTrigun Shivji Ki Aarti Jo Koi Nar Gave\nKahat Shivanand Swami Manvanchit Phal Pave\nOm Jai Shiv Onkara",
  meaning:"Complete Aarti of Lord Shiva — the cosmic Omkara, worshipped by Brahma and Vishnu together. This aarti describes Shiva's divine forms, ornaments, and attributes. Singing this grants all heart's desires.",
  benefits:["Purifies the five elements in the body","Brings deep inner peace and calm","Removes ego and false pride","Connects with divine consciousness"],
  time:"Morning and evening pooja, Mahashivratri, Mondays",reps:"Once at each pooja"},

  {id:9,name:"Hare Krishna Mahamantra",hindi:"हरे कृष्ण महामंत्र",deity:"Lord Krishna",cat:"Love & Joy",em:"🪈",col:"#1B5E20",
  text:"हरे कृष्ण हरे कृष्ण\nकृष्ण कृष्ण हरे हरे।\nहरे राम हरे राम\nराम राम हरे हरे।।\n\nहरे कृष्ण हरे कृष्ण\nकृष्ण कृष्ण हरे हरे।\nहरे राम हरे राम\nराम राम हरे हरे।।\n\nहरे कृष्ण हरे कृष्ण\nकृष्ण कृष्ण हरे हरे।\nहरे राम हरे राम\nराम राम हरे हरे।।",
  roman:"Hare Krishna Hare Krishna\nKrishna Krishna Hare Hare\nHare Rama Hare Rama\nRama Rama Hare Hare\n\nHare Krishna Hare Krishna\nKrishna Krishna Hare Hare\nHare Rama Hare Rama\nRama Rama Hare Hare\n\nHare Krishna Hare Krishna\nKrishna Krishna Hare Hare\nHare Rama Hare Rama\nRama Rama Hare Hare",
  meaning:"The Mahamantra — the greatest mantra for this age of Kali Yuga. Calling upon Krishna and Rama fills the heart with pure divine love and bliss, cleansing the mind of all material desires.",
  benefits:["Fills heart with divine love and bliss","Cleanses the mind of all material desires","Brings inner joy and happiness","Liberates the soul from repeated birth and death"],
  time:"Any time, especially during kirtan",reps:"Continuous chanting (japa)"},

  {id:10,name:"Durga Saptashloki",hindi:"दुर्गा सप्तश्लोकी",deity:"Goddess Durga",cat:"Protection",em:"⚔️",col:"#880E4F",
  text:"शिवोऽवाच।।\nदेवि त्वं भक्तसुलभे सर्वकार्यविधायिनी।\nकलौ हि कार्यसिद्ध्यर्थमुपायं ब्रूहि यत्नतः।।1।।\n\nदेव्युवाच।\nशृणु देव प्रवक्ष्यामि कलौ सर्वेष्टसाधनम्।\nमया तवैव स्नेहेनाप्यम्बास्तुतिः प्रकाश्यते।।2।।\n\nज्ञानिनामपि चेतांसि देवी भगवती हि सा।\nबलादाकृष्य मोहाय महामाया प्रयच्छति।।3।।\n\nदुर्गे स्मृता हरसि भीतिमशेषजन्तोः\nस्वस्थैः स्मृता मतिमतीव शुभां ददासि।\nदारिद्र्यदुःखभयहारिणि का त्वदन्या\nसर्वोपकारकरणाय सदाऽऽर्द्रचित्ता।।4।।\n\nसर्वमंगलमांगल्ये शिवे सर्वार्थसाधिके।\nशरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तु ते।।5।।\n\nशरणागतदीनार्तपरित्राणपरायणे।\nसर्वस्यार्तिहरे देवि नारायणि नमोऽस्तु ते।।6।।\n\nसर्वस्वरूपे सर्वेशे सर्वशक्तिसमन्विते।\nभयेभ्यस्त्राहि नो देवि दुर्गे देवि नमोऽस्तु ते।।7।।",
  roman:"Shivovach\nDevi Tvam Bhakta-sulabhe Sarvakaryavidhayini\nKalau Hi Karyasiddhyartham Upayam Bruhi Yatnata ॥1॥\n\nDevyuvacha\nShriṇu Deva Pravakshyami Kalau Sarveshṭa-sadhanam\nMaya Tavaiv Snehenaapyambastutih Prakashyate ॥2॥\n\nGyaninimapi Chetansi Devi Bhagavati Hi Sa\nBaladakrishya Mohaya Mahamaya Prayacchati ॥3॥\n\nDurge Smrita Harasi Bhitim-Ashesha-Jantoh\nSvasthair Smrita Matimateem Shubham Dadasi\nDaridrya-Duhkha-Bhayaharini Ka Tvadanya\nSarvopakara-Karanaya Sada Ardrachita ॥4॥\n\nSarva-Mangala-Mangalye Shive Sarvartha-Sadhike\nSharanye Tryambake Gauri Narayani Namo-astu Te ॥5॥\n\nSharanagata-Dinartha-Paritraana-Paraayane\nSarvasya-Artihaare Devi Narayani Namo-astu Te ॥6॥\n\nSarva-Svarupe Sarveshe Sarva-Shakti-Samanvite\nBhayebhyas-Trahi No Devi Durge Devi Namo-astu Te ॥7॥",
  meaning:"The seven divine shlokas of Durga Saptashloki — considered equal in power to the entire Durga Saptashati (700 verses). These seven verses invoke Goddess Durga's supreme protective power and blessings.",
  benefits:["Provides divine protection from all evil","Destroys negative energies and obstacles","Bestows courage and inner strength","Removes all fears and dangers"],
  time:"Tuesdays, Fridays, Navratri, daily morning",reps:"7 times for full protection"},

  {id:11,name:"Shiva Panchakshara Stotram",hindi:"शिव पञ्चाक्षर स्तोत्रम्",deity:"Lord Shiva",cat:"Devotion",em:"🔱",col:"#311B92",
  text:"नागेन्द्रहाराय त्रिलोचनाय\nभस्माङ्गरागाय महेश्वराय।\nनित्याय शुद्धाय दिगम्बराय\nतस्मै नकाराय नमः शिवाय।।1।।\n\nमन्दाकिनीसलिलचन्दनचर्चिताय\nनन्दीश्वरप्रमथनाथमहेश्वराय।\nमन्दारपुष्पबहुपुष्पसुपूजिताय\nतस्मै मकाराय नमः शिवाय।।2।।\n\nशिवाय गौरीवदनाब्जवृन्द\nसूर्याय दक्षाध्वरनाशकाय।\nश्रीनीलकण्ठाय वृषध्वजाय\nतस्मै शिकाराय नमः शिवाय।।3।।\n\nवसिष्ठकुम्भोद्भवगौतमार्य\nमुनीन्द्रदेवार्चितशेखराय।\nचन्द्रार्कवैश्वानरलोचनाय\nतस्मै वकाराय नमः शिवाय।।4।।\n\nयक्षस्वरूपाय जटाधराय\nपिनाकहस्ताय सनातनाय।\nदिव्याय देवाय दिगम्बराय\nतस्मै यकाराय नमः शिवाय।।5।।\n\nपञ्चाक्षरमिदं पुण्यं यः पठेच्छिवसन्निधौ।\nशिवलोकमवाप्नोति शिवेन सह मोदते।।",
  roman:"Nagendraharaya Trilochanaya\nBhashmangaragaya Maheshvaraya\nNityaya Shuddhaya Digambaraya\nTaskmai Nakaraya Namah Shivaya ॥1॥\n\nMandakinisalila Chandana-Charchitaya\nNandishvara-Pramathanatha-Maheshvaraya\nMandara-Pushpa-Bahu-Pushpa-Supujitaya\nTaskmai Makaraya Namah Shivaya ॥2॥\n\nShivaya Gauri-Vadana-Abjav-Vrinda\nSuryaya Dakshadhvara-Nashakaya\nShri-Nilakanthaya Vrishadhvajaya\nTaskmai Shikaraya Namah Shivaya ॥3॥\n\nVasishtha-Kumbhodbhava-Gautama-Arya\nMuniindra-Devarchita-Shekharaya\nChandarka-Vaishvanara-Lochanaya\nTaskmai Vakaraya Namah Shivaya ॥4॥\n\nYaksha-Svarupaya Jatadharaya\nPinaka-Hastaya Sanatanaya\nDivyaya Devaya Digambaraya\nTaskmai Yakaraya Namah Shivaya ॥5॥\n\nPanchaksharam Idam Punyam Yah Pathec-Chiva-Sannidhau\nShivalokam Avaapnoti Shivena Saha Modate",
  meaning:"The complete Shiva Panchakshara Stotram — 5 verses, each explaining one syllable of Om Namah Shivaya (Na-Ma-Shi-Va-Ya). Whoever recites this near Shiva attains Shivaloka and rejoices with Shiva himself.",
  benefits:["Deep purification of the five elements within","Attainment of Shiva's divine grace","Liberation from cycle of birth and death","Inner peace and higher consciousness"],
  time:"Early morning, Mondays, Mahashivratri",reps:"Once daily or 108 times"},

  {id:12,name:"Ram Raksha Stotra",hindi:"राम रक्षा स्तोत्र",deity:"Lord Rama",cat:"Protection",em:"🏹",col:"#1B5E20",
  text:"श्रीगणेशाय नमः।\nअस्य श्रीरामरक्षास्तोत्रमन्त्रस्य।\nबुधकौशिक ऋषिः।\nश्री सीतारामचन्द्रो देवता।\nअनुष्टुप् छन्दः।\n\nचरितं रघुनाथस्य शतकोटिप्रविस्तरम्।\nएकैकमक्षरं पुंसां महापातकनाशनम्।।1।।\n\nध्यायेदाजानुबाहुं धृतशरधनुषं बद्धपद्मासनस्थम्।\nपीतं वासो वसानं नवकमलदलस्पर्धिनेत्रं प्रसन्नम्।।2।।\n\nरामो राजमणिः सदा विजयते रामं रमेशं भजे।\nरामेणाभिहता निशाचरचमू रामाय तस्मै नमः।।3।।\n\nरामान्नास्ति परायणं परतरं रामस्य दासोऽस्म्यहम्।\nरामे चित्तलयः सदा भवतु मे भो राम मामुद्धर।।4।।\n\nराम रामेति रामेति रमे रामे मनोरमे।\nसहस्रनाम तत्तुल्यं रामनाम वरानने।।5।।\n\nइति श्री बुधकौशिकमुनिविरचितं रामरक्षास्तोत्रं सम्पूर्णम्।।",
  roman:"Shri Ganeshaya Namah\nAsya Shri Ramaraksha-stotra-mantrasya\nBudhkaushik Rishih\nShri Sitaramachandro Devata\nAnushtup Chhandah\n\nCharitam Raghunathasya Shatakoti-Pravistaram\nEkaika-Maksharaṃ Pumsam Mahapatakanashanam ॥1॥\n\nDhyayed-Ajanubahum Dhrita-Shara-Dhanuṣam Baddha-Padmasanastham\nPitam Vaso Vasanam Navakamala-Dal-Spardhi-Netram Prasannam ॥2॥\n\nRamo Rajamanih Sada Vijayate Ramam Rameyam Bhaje\nRamenabhihata Nishacharachamu Ramaya Tasmai Namah ॥3॥\n\nRaman-Nasti Parayanam Parataram Ramasya Daso-Asmya-Ham\nRame Chitta-Layah Sada Bhavatu Me Bho Rama Mam-Uddhara ॥4॥\n\nRama Rameti Rameti Rame Rame Manorame\nSahasranama Tattulya Ramanama Varanane ॥5॥\n\nIti Shri Budhakaushika-Muni-Virachitam Ramaraksha-Stotram Sampurnam",
  meaning:"The complete Ram Raksha Stotra by sage Budhakaushika — the divine armour of Lord Rama. Each syllable of Rama's story destroys great sins. Chanting 'Rama Rama Rama' is equal to reciting all 1000 names of Vishnu.",
  benefits:["Complete protection from all fears","Removes negative energies","Grants peace of mind and emotional stability","Ensures victory in all endeavors"],
  time:"Morning and evening, especially Sundays and Ram Navami",reps:"11 times for full protection"},

  {id:13,name:"Vishnu Sahasranama (Phala Shruti)",hindi:"विष्णु सहस्रनाम फलश्रुति",deity:"Lord Vishnu",cat:"Universal",em:"🪷",col:"#1565C0",
  text:"यस्य स्मरणमात्रेण जन्मसंसारबन्धनात्।\nविमुच्यते नमस्तस्मै विष्णवे प्रभविष्णवे।।\n\nॐ नमो विष्णवे प्रभविष्णवे।।\n\nविश्वं विष्णुर्वषट्कारो भूतभव्यभवत्प्रभुः।\nभूतकृद्भूतभृद्भावो भूतात्मा भूतभावनः।।1।।\n\nपूतात्मा परमात्मा च मुक्तानां परमागतिः।\nअव्ययः पुरुषः साक्षी क्षेत्रज्ञोऽक्षर एव च।।2।।\n\nयोगो योगविदां नेता प्रधानपुरुषेश्वरः।\nनारसिंहवपुः श्रीमान् केशवः पुरुषोत्तमः।।3।।\n\nसर्वः शर्वः शिवः स्थाणुर्भूतादिर्निधिरव्ययः।\nसम्भवो भावनो भर्ता प्रभवः प्रभुरीश्वरः।।4।।\n\nस्वयंभूः शम्भुरादित्यः पुष्कराक्षो महास्वनः।\nअनादिनिधनो धाता विधाता धातुरुत्तमः।।5।।\n\nॐ नमो भगवते वासुदेवाय।।\n\nइति विष्णोः सहस्रनाम स्तोत्रं फलश्रुति सहितम्।।",
  roman:"Yasya Smarana-Matrena Janma-Samsara-Bandhanat\nVimuchyate Namastasmai Vishnave Prabhavishnave\n\nOm Namo Vishnave Prabhavishnave\n\nVishvam Vishnur-Vashat-Karo Bhuta-Bhavya-Bhavatprabhuh\nBhutakrid-Bhutabhrid-Bhavo Bhutatma Bhuta-Bhavanah ॥1॥\n\nPutatma Paramatma Cha Muktanam Paramagatih\nAvyayah Purushah Sakshi Kshetragyo-Akshara Eva Cha ॥2॥\n\nYogo Yogavidam-Neta Pradhana-Purusheshvarah\nNarasimhavapuh Shriman Keshavah Purushottamah ॥3॥\n\nSarvah Sharvah Shivah Sthanur-Bhutadir-Nidhiravyayah\nSambhavo Bhavano Bharta Prabhavah Prabhur-Ishvarah ॥4॥\n\nSwayambhuh Shambhur-Adityah Pushkaraksh-Maha-Svanah\nAnadinidhano Dhata Vidhata Dhatur-Uttamah ॥5॥\n\nOm Namo Bhagavate Vasudevaya\n\nIti Vishnoh Sahasranama Stotram Phalashruti Sahitam",
  meaning:"Vishnu Sahasranama — 1000 divine names of Lord Vishnu with Phala Shruti. Merely remembering Vishnu frees one from the bondage of birth and rebirth. These names describe Vishnu as the universe, the eternal, the liberator of all souls.",
  benefits:["Removes all sins and purifies the soul","Grants liberation (moksha) from rebirth","Bestows health, wealth, and prosperity","Protection and blessings of Lord Vishnu"],
  time:"Daily morning, especially Ekadashi and Thursdays",reps:"Recite with devotion daily"},

  {id:14,name:"Navagraha Stotra",hindi:"नवग्रह स्तोत्र",deity:"Nine Planets",cat:"Astrology",em:"🌠",col:"#FF6F00",
  text:"ब्रह्मा मुरारिस्त्रिपुरान्तकारी\nभानुः शशी भूमिसुतो बुधश्च।\nगुरुश्च शुक्रः शनिराहुकेतवः\nकुर्वन्तु सर्वे मम सुप्रभातम्।।1।।\n\nजपाकुसुमसंकाशं काश्यपेयं महाद्युतिम्।\nतमोऽरिं सर्वपापघ्नं प्रणतोऽस्मि दिवाकरम्।।2।।\n\nदधिशंखतुषाराभं क्षीरोदार्णवसंभवम्।\nनमामि शशिनं सोमं शम्भोर्मुकुटभूषणम्।।3।।\n\nधरणीगर्भसंभूतं विद्युत्कान्तिसमप्रभम्।\nकुमारं शक्तिहस्तं च मंगलं प्रणमाम्यहम्।।4।।\n\nप्रियंगुकलिकाश्यामं रूपेणाप्रतिमं बुधम्।\nसौम्यं सौम्यगुणोपेतं तं बुधं प्रणमाम्यहम्।।5।।\n\nदेवानां च ऋषीणां च गुरुं कांचनसन्निभम्।\nबुद्धिभूतं त्रिलोकेशं तं नमामि बृहस्पतिम्।।6।।\n\nहिमकुंदमृणालाभं दैत्यानां परमं गुरुम्।\nसर्वशास्त्रप्रवक्तारं भार्गवं प्रणमाम्यहम्।।7।।\n\nनीलाञ्जनसमाभासं रविपुत्रं यमाग्रजम्।\nछायामार्तण्डसम्भूतं तं नमामि शनैश्चरम्।।8।।\n\nअर्धकायं महावीर्यं चन्द्रादित्यविमर्दनम्।\nसिंहिकागर्भसंभूतं तं राहुं प्रणमाम्यहम्।।9।।\n\nपलाशपुष्पसंकाशं तारकाग्रहमस्तकम्।\nरौद्रं रौद्रात्मकं घोरं तं केतुं प्रणमाम्यहम्।।10।।\n\nइति नवग्रहस्तोत्रम् सम्पूर्णम्।।",
  roman:"Brahma Muraris Tripurantakari\nBhanuh Shashi Bhumisuto Budhashcha\nGurushcha Shukrah Shani Rahuketus\nKurvantu Sarve Mama Suprabhatam ॥1॥\n\nJapakusuma-Sankasham Kashyapeyam Mahadyutim\nTamor-Arim Sarvapapaghnam Pranato-Asmi Divakaram ॥2॥\n\nDadhi-Shankha-Tusharabham Kshirodarnava-Sambhavam\nNamami Sashinam Somam Shambhor-Mukuta-Bhushanam ॥3॥\n\nDharani-Garbha-Sambhutam Vidyutkanti-Samaprabham\nKumaram Shakti-Hastam Cha Mangalam Pranamam-Yaham ॥4॥\n\nPriyangu-Kalika-Shyamam Rupen-Apratimam Budham\nSaumyam Saumya-Gunopetam Tam Budham Pranamam-Yaham ॥5॥\n\nDevanam Cha Rishinam Cha Gurum Kanchana-Sannibham\nBuddhibhutam Trilokesham Tam Namami Brihaspatim ॥6॥\n\nHimakunda-Mrinala-Abham Daityanam Paramam Gurum\nSarvashastra-Pravaktaram Bhargavam Pranamam-Yaham ॥7॥\n\nNilanjana-Samabhasam Raviputram Yamagrajam\nChhaya-Martanda-Sambhutam Tam Namami Shanaishcharam ॥8॥\n\nArdhakayam Mahaveerym Chandrditya-Vimardanam\nSinhika-Garbha-Sambhutam Tam Rahum Pranamam-Yaham ॥9॥\n\nPalasha-Pushpa-Sankasham Taraka-Graha-Mastakam\nRaudram Raudratmakam Ghoram Tam Ketum Pranamam-Yaham ॥10॥\n\nIti Navagraha-Stotram Sampurnam",
