const BLOG_POSTS = [
  {id:1,em:'🕉️',col:'#4A148C',cat:'Philosophy',title:'The Transcendence and Cosmic Speech of OM',readTime:'5 min',excerpt:'OM is not merely a word — it is the primordial sound from which the entire universe was born.',content:`<h2>What is OM (ॐ)?</h2><p>OM is the most sacred syllable in Hinduism — the first sound of creation, the primordial vibration from which all existence emerged. The Mandukya Upanishad devotes all 12 of its sutras entirely to this single syllable.</p><blockquote>"OM is all this. OM is the past, present and future. And whatever is beyond the three periods of time is also OM." — Mandukya Upanishad</blockquote><h2>The Three States of OM</h2><p>The syllable contains three sounds — A, U, and M — representing the three states of consciousness: waking (jagrat), dreaming (svapna), and deep sleep (sushupti). The silence after OM represents Turiya — pure consciousness.</p><h2>Scientific Significance</h2><p>The frequency of OM (approximately 432 Hz) resonates with the natural frequency of Earth. This ancient wisdom, encoded in a single syllable, demonstrates the profound scientific depth hidden within Hindu spiritual traditions.</p>`},
  {id:2,em:'🪷',col:'#1565C0',cat:'Philosophy',title:'Understanding Karma: The Cosmic Law of Action',readTime:'7 min',excerpt:'Karma is not punishment or reward — it is a precise, impartial law of cause and effect that governs all existence.',content:`<h2>What is Karma?</h2><p>Karma literally means "action." It encompasses the law of cause and effect governing all existence. Your present circumstances are the result of past actions; your present actions create future circumstances.</p><blockquote>"Karmanye vadhikaraste ma phaleshu kadachana" — You have the right to perform your duties, but never to the fruits of your actions. — Bhagavad Gita 2.47</blockquote><h2>Three Types of Karma</h2><p>Sanchita (accumulated past karma), Prarabdha (karma ripening in this life), and Agami (karma created now) together form the complete karmic picture of every soul.</p>`},
  {id:3,em:'🧘',col:'#1B5E20',cat:'Practice',title:'Dhyana: The Ancient Science of Hindu Meditation',readTime:'6 min',excerpt:"Dhyana is the seventh limb of Patanjali's Ashtanga Yoga. Discover how this ancient practice transforms the mind.",content:`<h2>What is Dhyana?</h2><p>Dhyana is the Sanskrit word for meditation — specifically the state of pure, uninterrupted contemplation on a single object, mantra, or divine form. Patanjali defines it as the unbroken flow of consciousness toward the object of meditation.</p><blockquote>"Yoga chitta vritti nirodha" — Yoga is the cessation of the fluctuations of the mind. — Patanjali Yoga Sutra 1.2</blockquote><h2>How to Begin Dhyana</h2><p>Start with a comfortable seated posture. Focus on your breath or a chosen mantra. When thoughts arise, simply observe them without judgment — like clouds drifting across an open sky — and gently return to your focus.</p>`},
  {id:4,em:'🔱',col:'#B71C1C',cat:'Deities',title:'The Trinity: Brahma, Vishnu & Mahesh Explained',readTime:'8 min',excerpt:'The Trimurti represents the three fundamental forces of the cosmos — creation, preservation, and transformation.',content:`<h2>The Cosmic Trinity</h2><p>The Hindu Trimurti consists of Brahma (Creator), Vishnu (Preserver), and Shiva (Transformer). Together they represent the eternal cycle governing all existence. They are not separate gods but three aspects of the one supreme Brahman.</p><blockquote>"The whole universe is contained within the Trinity." — Vishnu Purana</blockquote><h2>Beyond the Trinity</h2><p>The Devi (Divine Mother) is considered the Shakti — the power — behind all three. Without Shakti, Brahma cannot create, Vishnu cannot preserve, and Shiva cannot transform. This is why Shakti worship is so central to Hinduism.</p>`},
  {id:5,em:'⭐',col:'#F57F17',cat:'Astrology',title:'Navagrahas: The Nine Planetary Deities of Vedic Astrology',readTime:'6 min',excerpt:'The nine planets of Vedic astrology are cosmic intelligences that influence every aspect of human life and destiny.',content:`<h2>What are the Navagrahas?</h2><p>The nine celestial deities — Surya, Chandra, Mangala, Budha, Brihaspati, Shukra, Shani, Rahu and Ketu — each govern specific aspects of human life and karma. They are not random astronomical bodies but conscious divine intelligences.</p><blockquote>"The planets are the hands of the cosmic clock, measuring the rhythm of karma." — Brihat Parashara Hora Shastra</blockquote><h2>Shani — The Great Teacher</h2><p>Saturn (Shani) is the most feared yet most just of all planets. He delivers the precise fruits of karma — rewarding disciplined souls and challenging those who have strayed from dharma. His lessons, though difficult, lead to ultimate liberation.</p>`},
  {id:6,em:'🪔',col:'#E65100',cat:'Practice',title:'The Sacred Science of Aarti: Why We Wave the Flame',readTime:'4 min',excerpt:'Every element of Aarti — the lamp, the circular motion, the bell — carries profound spiritual significance.',content:`<h2>What is Aarti?</h2><p>Aarti is the ritual of waving a lit lamp before a deity. The word comes from Sanskrit "Aratrika" — the light that removes ignorance. It is not merely a ceremony but a complete offering of the self to the divine.</p><blockquote>"The lamp of knowledge illuminates the heart and dispels the darkness of ignorance." — Devi Bhagavata Purana</blockquote><h2>The Five Elements</h2><p>A complete Aarti uses all five Pancha Bhuta elements: Earth (flowers), Water (holy water), Fire (lit lamp), Air (waving fan), Space (ringing bell). This connects the devotee with the entire cosmos in a single sacred act.</p>`},
  {id:7,em:'📜',col:'#4A148C',cat:'Scripture',title:"The Four Vedas: India's Oldest Spiritual Texts",readTime:'9 min',excerpt:"The Vedas are the world's oldest surviving religious texts. Written over 5,000 years ago, they contain the complete blueprint of spiritual science.",content:`<h2>What are the Vedas?</h2><p>The Vedas are four sacred compilations: Rigveda (hymns), Samaveda (melodies), Yajurveda (rituals), and Atharvaveda (practical knowledge). They were not written but "heard" (shruti) by ancient sages in deep meditation.</p><blockquote>"Ekam sat vipra bahudha vadanti" — Truth is one; the wise call it by many names. — Rigveda 1.164.46</blockquote><h2>Structure of the Vedas</h2><p>Each Veda has four sections: Samhitas (hymns), Brahmanas (rituals), Aranyakas (forest treatises), and Upanishads (philosophical conclusions). The Upanishads are called Vedanta — the end, essence, and fulfillment of the Vedas.</p>`},
  {id:8,em:'🏛️',col:'#1B5E20',cat:'Temples',title:'The Architecture of Hindu Temples: A Cosmic Blueprint',readTime:'7 min',excerpt:'A Hindu temple is not just a building — it is a three-dimensional mandala, a cosmic diagram in stone representing the entire universe.',content:`<h2>The Temple as Cosmos</h2><p>The Hindu temple (mandir) follows strict rules of Vastu Shastra and Agama Shastra — ancient sciences of sacred geometry. Every dimension, every direction, every sculpture has precise cosmic significance.</p><blockquote>"The temple is the body of the god. The innermost shrine (garbhagriha) is the womb where divine energy concentrates." — Manasara (Architecture text)</blockquote><h2>The Gopuram</h2><p>The towering entrance gates (Gopurams) of South Indian temples are covered with thousands of colorful sculptures representing every aspect of creation — deities, humans, animals, demons — showing that everything in existence is divine.</p>`},
  {id:9,em:'🧬',col:'#006064',cat:'Philosophy',title:'Atman and Brahman: The Core of Upanishadic Philosophy',readTime:'8 min',excerpt:'The Upanishads reveal the greatest secret: your individual self (Atman) is identical to the universal consciousness (Brahman).',content:`<h2>The Great Mahavakyas</h2><p>The four great sayings (Mahavakyas) of the Upanishads reveal the ultimate truth: "Aham Brahmasmi" (I am Brahman), "Tat Tvam Asi" (Thou art That), "Prajnanam Brahma" (Consciousness is Brahman), "Ayam Atma Brahma" (This Self is Brahman).</p><blockquote>"Tat Tvam Asi" — Thou art That. Your deepest self is identical to the ground of all existence. — Chandogya Upanishad 6.8.7</blockquote><h2>Practical Implication</h2><p>When you truly realize that Atman = Brahman, the fear of death dissolves because you understand that your essential nature was never born and can never die. This is the state of Moksha — liberation from the cycle of birth and death.</p>`},
  {id:10,em:'🌿',col:'#2E7D32',cat:'Practice',title:'Tulsi: The Sacred Plant at the Heart of Hindu Homes',readTime:'5 min',excerpt:'The Tulsi plant is considered the earthly manifestation of Goddess Lakshmi. Hindu homes have worshipped Tulsi for over 5,000 years.',content:`<h2>Why is Tulsi Sacred?</h2><p>Tulsi (Holy Basil) is the most sacred plant in Hinduism, considered the earthly form of Goddess Vrinda (Lakshmi). The Padma Purana declares that a house with Tulsi is purified as if touched by the Ganges itself.</p><blockquote>"In whatever house the Tulsi plant is grown with devotion, disease, poverty, and sin never enter." — Padma Purana</blockquote><h2>Scientific Benefits</h2><p>Modern science confirms what ancient rishis knew: Tulsi is a powerful adaptogen, immune booster, anti-bacterial, anti-viral, and stress-reducer. The air around a Tulsi plant is ozonized and free of harmful bacteria.</p>`},
  {id:11,em:'🔮',col:'#7B1FA2',cat:'Astrology',title:'Vedic Astrology vs Western Astrology: Key Differences',readTime:'6 min',excerpt:'Jyotisha — the science of light — is one of the six Vedangas. Understanding how it differs from Western astrology reveals its unique depth.',content:`<h2>The Foundation Difference</h2><p>Western astrology uses the Tropical zodiac (based on seasons), while Vedic astrology uses the Sidereal zodiac (based on actual star positions). This creates a ~23-degree difference — meaning your "sign" in Vedic astrology is usually different from your Western sign.</p><blockquote>"Jyotisha is the eye of the Vedas." — Ancient Vedic text</blockquote><h2>The Role of Karma</h2><p>Vedic astrology views the birth chart as a karmic blueprint — showing the results of past-life actions ripening in this lifetime. The goal is not just prediction but remediation through mantras, gems, charity, and spiritual practices.</p>`},
  {id:12,em:'🌺',col:'#AD1457',cat:'Deities',title:'The Ten Avatars of Vishnu: The Dashavataras',readTime:'10 min',excerpt:'Lord Vishnu descends to Earth whenever dharma is threatened. His 10 avatars trace the entire evolution of life on Earth — a spiritual equivalent of Darwin\'s theory.',content:`<h2>The Ten Divine Descents</h2><p>The Dashavataras are: Matsya (fish), Kurma (turtle), Varaha (boar), Narasimha (man-lion), Vamana (dwarf), Parashurama, Rama, Krishna, Buddha, and Kalki (yet to come). Remarkably, they parallel the evolution of life from water to land.</p><blockquote>"Yada yada hi dharmasya glanir bhavati Bharata... sambhavami yuge yuge." — Whenever dharma declines, I descend. — Bhagavad Gita 4.7-8</blockquote><h2>The Evolutionary Sequence</h2><p>Matsya (fish) → Kurma (amphibian) → Varaha (land mammal) → Narasimha (semi-human) → Vamana (full human, short) → Parashurama (aggressive human) → Rama (ethical human) → Krishna (enlightened human). This sequence mirrors evolutionary biology — a remarkable fact about ancient Hindu cosmology.</p>`},
];

// ═══════════════════════════
function h(tag, attrs={}, ...children){
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v)}
    else if(k==='html'){el.innerHTML=v}
    else if(k.startsWith('on')){el.addEventListener(k.slice(2).toLowerCase(),v)}
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()){
    if(c==null||c===false)continue;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return el;
}

function navigate(page, extra={}){
  Object.assign(state,extra,{page,menuOpen:false});
  window.scrollTo({top:0,behavior:'smooth'});
  render();
}

function showToast(msg){
  let t = document.querySelector('.toast');
  if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function applyTheme(idx){
  const t = THEMES[idx];
  const r = document.documentElement.style;
  r.setProperty('--saffron', t.saffron);
  r.setProperty('--gold', t.gold);
  r.setProperty('--maroon', t.maroon);
  r.setProperty('--maroon-dark', t.maroon);
  r.setProperty('--deep', t.deep);
  if(!state.darkMode) r.setProperty('--cream', t.cream);
}

const FONT_OPTIONS = [
  {name:'Classic (Cinzel)',display:"'Cinzel',Georgia,serif"},
  {name:'Modern (Georgia)',display:"Georgia,'Times New Roman',serif"},
  {name:'Elegant (Palatino)',display:"Palatino,'Book Antiqua',serif"},
];

function render(){
  if(state.darkMode) document.body.classList.add('dark');
  else document.body.classList.remove('dark');
  applyTheme(state.activeTheme);
  document.documentElement.style.setProperty('--display', FONT_OPTIONS[state.activeFont].display);

  const app = document.getElementById('app');
  app.innerHTML='';
  app.appendChild(buildNav());
  const main = h('main');
  switch(state.page){
    case 'home': main.appendChild(buildHome()); break;
    case 'temples': main.appendChild(buildTemples()); break;
    case 'mantras': main.appendChild(buildMantras()); break;
    case 'horoscope': main.appendChild(buildHoroscope()); break;
    case 'pooja': main.appendChild(buildPooja()); break;
    case 'texts': main.appendChild(buildTexts()); break;
    case 'festivals': main.appendChild(buildFestivals()); break;
    case 'ai': main.appendChild(buildAI()); break;
    case 'blog': main.appendChild(buildBlog()); break;
    case 'darshan': main.appendChild(buildDarshan()); break;
    case 'darshan': main.appendChild(buildDarshan()); break;
  }
  app.appendChild(main);
  app.appendChild(buildFooter());
  if(state.page==='ai') scrollChat();

  // Theme customizer panel
  buildThemePanel();

  // Meditation overlay
  if(state.medMode && state.medMantra) buildMedOverlay();

  // Scroll-to-top button
  let stb = document.querySelector('.scroll-top');
  if(!stb){
    stb = document.createElement('button');
    stb.className='scroll-top';
    stb.innerHTML='↑';
    stb.title='Back to top';
    stb.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
    document.body.appendChild(stb);
    window.addEventListener('scroll',()=>{
      stb.classList.toggle('visible',window.scrollY>300);
    },{passive:true});
  }
}

function buildNav(){
  const nav = h('nav',{class:'nav'});
  const inner = h('div',{class:'nav-inner'});
  // logo
  const logo = h('div',{class:'logo',onclick:()=>navigate('home')},
    h('span',{class:'logo-om'},'🕉️'),
    h('div',{},
      h('div',{class:'logo-name'},'PANDIT JI'),
      h('div',{class:'logo-sub dev'},'आध्यात्मिक केंद्र')
    )
  );
  // desktop links
  const links = h('div',{class:'nav-links'});
  for(const item of NAV_ITEMS){
    const btn = h('button',{class:`nl${state.page===item.p?' act':''}`,onclick:()=>navigate(item.p)},
      h('span',{},item.ic), h('span',{},item.l)
    );
    links.appendChild(btn);
  }
  // dark mode + hamburger
  const dmBtn = h('button',{class:'dm-btn',onclick:()=>{state.darkMode=!state.darkMode;document.body.classList.toggle('dark',state.darkMode);render()}},
    state.darkMode ? '☀️ Light' : '🌙 Dark'
  );
  // hamburger
  const hb = h('button',{class:'hb',onclick:()=>{state.menuOpen=!state.menuOpen;render()}},
    h('span',{}),h('span',{}),h('span',{})
  );
  inner.append(logo,links,dmBtn,hb);
  nav.appendChild(inner);
  // mobile menu
  const mob = h('div',{class:`mob-menu${state.menuOpen?' open':''}`});
  for(const item of NAV_ITEMS){
    mob.appendChild(h('button',{class:`mob-link${state.page===item.p?' act':''}`,onclick:()=>navigate(item.p)},
      h('span',{},item.ic), h('span',{},item.l)
    ));
  }
  nav.appendChild(mob);
  return nav;
}

function buildThemePanel(){
  // remove any old panel
  document.querySelectorAll('.theme-panel,.theme-drawer').forEach(e=>e.remove());

  const drawer = document.createElement('div');
  drawer.className = `theme-drawer${state.themeOpen?'':' closed'}`;

  let html = `<div class="th-title">🎨 Customize <button onclick="state.themeOpen=false;render()" style="background:rgba(255,248,240,.1);border:1px solid rgba(255,248,240,.2);color:rgba(255,248,240,.7);width:22px;height:22px;border-radius:50%;font-size:12px;cursor:pointer;line-height:1">✕</button></div>`;
  html += `<div class="th-section"><div class="th-label">Color Theme</div><div class="th-colors">`;
  const swatchColors = ['#FF6B35','#2E7D32','#1565C0','#AD1457','#6A1B9A','#00695C'];
  THEMES.forEach((t,i)=>{
    html += `<div class="th-swatch${state.activeTheme===i?' act':''}" style="background:${swatchColors[i]}" title="${t.name}" onclick="state.activeTheme=${i};render()"></div>`;
  });
  html += `</div></div>`;
  html += `<div class="th-section"><div class="th-label">Font Style</div><div class="th-fonts">`;
  FONT_OPTIONS.forEach((f,i)=>{
    html += `<button class="th-font-btn${state.activeFont===i?' act':''}" onclick="state.activeFont=${i};render()">${f.name}</button>`;
  });
  html += `</div></div>`;
  html += `<div class="th-section"><div class="th-label">Mode</div><button onclick="state.darkMode=!state.darkMode;render()" style="width:100%;background:rgba(255,248,240,.07);border:1px solid rgba(245,166,35,.2);color:rgba(255,248,240,.75);padding:8px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--body)">${state.darkMode?'☀️ Light Mode':'🌙 Dark Mode'}</button></div>`;

  drawer.innerHTML = html;
  document.body.appendChild(drawer);

  const tab = document.createElement('div');
  tab.className = 'theme-panel';
  tab.innerHTML = `<button class="theme-tab" onclick="state.themeOpen=!state.themeOpen;render()" title="Customize Theme">🎨<br>Theme</button>`;
  document.body.appendChild(tab);
}

window._medTimer = null;

function startMedMode(m){
  state.medMantra = m;
  state.medMode = true;
  state.medPlaying = false;
  state.medCount = 0;
  state.medElapsed = 0;
  render();
}

function toggleMedPlay(){
  const synth = window.speechSynthesis;
  if(!synth) return;
  if(state.medPlaying){
    synth.pause();
    state.medPlaying = false;
    clearInterval(window._medTimer);
    render(); return;
  }
  // start / resume
  state.medPlaying = true;
  function chantOnce(){
    if(!state.medPlaying) return;
    synth.cancel();
    const m = state.medMantra;
    const utt = new SpeechSynthesisUtterance(m.roman.replace(/\n/g,' '));
    const voices = synth.getVoices();
    const v = voices.find(v=>v.lang.startsWith('en'))||voices[0];
    if(v) utt.voice = v;
    utt.rate = state.medSpeed;
    utt.pitch = 0.9;
    utt.onend = ()=>{ state.medCount++; chantOnce(); render(); };
    utt.onerror = ()=>{ state.medPlaying=false; render(); };
    synth.speak(utt);
  }
  chantOnce();
  // elapsed timer
  window._medTimer = setInterval(()=>{
    state.medElapsed++;
    const el = document.getElementById('med-timer');
    if(el){
      const m=Math.floor(state.medElapsed/60), s=state.medElapsed%60;
      el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    const cc = document.getElementById('med-count');
    if(cc) cc.textContent = state.medCount;
  },1000);
  render();
}

function closeMedMode(){
  window.speechSynthesis.cancel();
  clearInterval(window._medTimer);
  state.medMode=false; state.medPlaying=false;
  state.medCount=0; state.medElapsed=0;
  render();
}

function buildMedOverlay(){
  const m = state.medMantra;
  const mins=Math.floor(state.medElapsed/60), secs=state.medElapsed%60;
  const ov = document.createElement('div');
  ov.className = 'med-overlay';
  ov.innerHTML = `
    <button class="med-close" onclick="closeMedMode()">✕</button>
    <div class="med-om${state.medPlaying?' med-pulsing':''}">ॐ</div>
    <div class="med-name">${m.name}</div>
    <div class="med-deity">${m.hindi} · ${m.deity}</div>
    <div class="med-text dev">${m.text}</div>
    <div class="med-controls">
      <button class="med-btn" onclick="state.medCount=Math.max(0,state.medCount-1);render()" title="−1">−</button>
      <button class="med-btn primary" onclick="toggleMedPlay()" id="med-play-btn">${state.medPlaying?'⏸':'▶'}</button>
      <button class="med-btn" onclick="window.speechSynthesis.cancel();clearInterval(window._medTimer);state.medPlaying=false;state.medElapsed=0;render()" title="Stop">⏹</button>
    </div>
    <div class="med-count-disp" id="med-count">${state.medCount}</div>
    <div class="med-count-sub">Chants completed · ${Math.floor(state.medCount/108)} mala${Math.floor(state.medCount/108)!==1?'s':''}</div>
    <div class="med-timer" id="med-timer">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>

}

function buildTemples(){
  if(state.selectedTemple) return buildTempleDetail(state.selectedTemple);
  const wrap = h('div',{});

  // ── PAGE HEADER ──
  const ph = h('div',{class:'ph'});
  const phc = h('div',{class:'con'});
  phc.innerHTML=`<h1 class="pt">🛕 Sacred Temples of the World</h1><p class="ps">Explore ${TEMPLES.length}+ temples across India and the world — filter by country, state, city & deity</p>`;

  // ── SMART FILTER BAR ──
  const fb = h('div',{class:'t-filter-bar'});

  // Row 1: Search + Country
  const row1 = h('div',{class:'t-filter-row'});
  const si = h('input',{class:'s-inp',placeholder:'🔍 Search temples, deities, cities...',value:state.templeSearch,style:{flex:'1',minWidth:'200px',borderRadius:'20px'}});
  si.addEventListener('input',e=>{state.templeSearch=e.target.value; state.templeState='All States'; state.templeCity='All Cities'; render();});

  // Country dropdown
  const countries = ['All Countries',...[...new Set(TEMPLES.map(t=>t.country))].sort()];
  const csel = h('select',{class:'t-sel'});
  csel.addEventListener('change',e=>{state.templeCountry=e.target.value; state.templeState='All States'; state.templeCity='All Cities'; render();});
  for(const c of countries){const o=h('option',{value:c},c); if(c===state.templeCountry) o.setAttribute('selected',''); csel.appendChild(o);}

  row1.append(si, csel);
  fb.appendChild(row1);

  // Row 2: State + City (dynamic based on country selection)
  const templsByCountry = state.templeCountry==='All Countries' ? TEMPLES : TEMPLES.filter(t=>t.country===state.templeCountry);
  const stateList = ['All States',...[...new Set(templsByCountry.map(t=>t.state))].sort()];
  const templsByState = state.templeState==='All States' ? templsByCountry : templsByCountry.filter(t=>t.state===state.templeState);
  const cityList = ['All Cities',...[...new Set(templsByState.map(t=>t.city))].sort()];

  const row2 = h('div',{class:'t-filter-row'});
  const stsel = h('select',{class:'t-sel'});
  stsel.addEventListener('change',e=>{state.templeState=e.target.value; state.templeCity='All Cities'; render();});
  for(const s of stateList){const o=h('option',{value:s},s); if(s===state.templeState) o.setAttribute('selected',''); stsel.appendChild(o);}

  const citysel = h('select',{class:'t-sel'});
  citysel.addEventListener('change',e=>{state.templeCity=e.target.value; render();});
  for(const c of cityList){const o=h('option',{value:c},c); if(c===state.templeCity) o.setAttribute('selected',''); citysel.appendChild(o);}

  row2.append(
    h('span',{class:'t-filter-label'},'📍 Location:'),
    stsel, citysel
  );
  fb.appendChild(row2);

  // Deity filter pills
  const deityGroups = ['All Deities','Shiva','Vishnu','Krishna','Ganesha','Durga / Kali','Lakshmi','Saraswati','Rama','Murugan / Kartikeya','Other'];
  const pillRow = h('div',{class:'deity-pills'});
  for(const dg of deityGroups){
    pillRow.appendChild(h('button',{
      class:`dp${(state.templeDeity||'All Deities')===dg?' act':''}`,
      onclick:()=>{state.templeDeity=dg;render();}
    },dg));
  }
  fb.appendChild(h('div',{style:{marginTop:'10px'}},
    h('span',{class:'t-filter-label',style:{marginBottom:'6px',display:'block'}},'🙏 Deity:'),
    pillRow
  ));

  phc.appendChild(fb);
  ph.appendChild(phc);
  wrap.appendChild(ph);

  // ── FILTER LOGIC ──
  let filtered = [...TEMPLES];
  if(state.templeSearch){
    const q=state.templeSearch.toLowerCase();
    filtered=filtered.filter(t=>t.name.toLowerCase().includes(q)||t.deity.toLowerCase().includes(q)||t.loc.toLowerCase().includes(q)||t.city.toLowerCase().includes(q)||(t.state&&t.state.toLowerCase().includes(q))||t.country.toLowerCase().includes(q));
  }
  if(state.templeCountry!=='All Countries') filtered=filtered.filter(t=>t.country===state.templeCountry);
  if(state.templeState!=='All States') filtered=filtered.filter(t=>t.state===state.templeState);
  if(state.templeCity!=='All Cities') filtered=filtered.filter(t=>t.city===state.templeCity);
  if(state.templeDeity && state.templeDeity!=='All Deities'){
    const dm = {
      'Shiva': /shiva|shiv|mahakal|jyotirlinga|lingam|pashupati/i,
      'Vishnu': /vishnu|venkateswara|narasimha|vitthal|jagannath|guruvayur|badrinath|swaminarayan/i,
      'Krishna': /krishna|vrindavan|mathura|banke bihari|dwarkadhish|govinda/i,
      'Ganesha': /ganesha|ganapati|vinayak|ganesh/i,
      'Durga / Kali': /durga|kali|chamundi|kamakhya|katyayani|vaishno|jwala|vindhya|saptashringi|vajreshwari|naina|jivdani|mumbadevi|kanaka durga/i,
      'Lakshmi': /lakshmi|mahalakshmi|kolhapur/i,
      'Saraswati': /saraswati/i,
      'Rama': /rama|ramachandra|sita|hanuman/i,
      'Murugan / Kartikeya': /murugan|kartikeya|subramania|ayyappa|palani|skanda/i,
    };
    const rx = dm[state.templeDeity];
    if(rx) filtered = filtered.filter(t=>rx.test(t.deity+' '+t.name));
  }

  // ── ACTIVE FILTER BREADCRUMBS ──
  const c = h('div',{class:'con sec'});
  const statsRow = h('div',{class:'t-stats-row'});
  statsRow.innerHTML=`<span style="font-family:var(--display);font-size:15px;color:var(--maroon);font-weight:700">${filtered.length} temple${filtered.length!==1?'s':''} found</span>`;

  if(state.templeCountry!=='All Countries') crumbs.push({label:`🌍 ${state.templeCountry}`,clear:()=>{state.templeCountry='All Countries';state.templeState='All States';state.templeCity='All Cities';render();}});
  if(state.templeState!=='All States') crumbs.push({label:`📍 ${state.templeState}`,clear:()=>{state.templeState='All States';state.templeCity='All Cities';render();}});
  if(state.templeCity!=='All Cities') crumbs.push({label:`🏙️ ${state.templeCity}`,clear:()=>{state.templeCity='All Cities';render();}});
  if(state.templeDeity && state.templeDeity!=='All Deities') crumbs.push({label:`🙏 ${state.templeDeity}`,clear:()=>{state.templeDeity='All Deities';render();}});

      onclick:()=>{state.templeCountry='All Countries';state.templeState='All States';state.templeCity='All Cities';state.templeDeity='All Deities';state.templeSearch='';render();}
    },'✕ Clear All');
    crumbRow.appendChild(clearAll);
    c.appendChild(crumbRow);
  }

  c.appendChild(statsRow);

  // ── TEMPLE CARDS ──
  const CHAR_DHAM = ['Badrinath Temple','Kedarnath Temple','Jagannath Puri','Dwarkadhish Temple','Rameshwaram Temple'];
  const g = h('div',{class:'g2',style:{marginTop:'16px'}});

    tc.innerHTML=`

        <div class="t-loc">📍 ${t.city}, ${t.state}</div>
        <div class="t-de">🙏 ${t.deity}</div>
        <div class="t-meta">

      </div>`;
    g.appendChild(tc);
  }
  c.appendChild(g);
  if(!filtered.length){
    c.innerHTML+=`<div style="text-align:center;padding:60px 20px;color:#999">
      <div style="font-size:56px">🛕</div>
      <div style="font-family:var(--display);font-size:18px;color:var(--maroon);margin-top:14px">No temples found</div>
      <p style="margin-top:8px;font-size:14px">Try changing your filters or search terms</p>

    </div>`;
  }
  wrap.appendChild(c);
  return wrap;
}

function buildMantras(){
  const wrap = h('div',{});
  const ph = h('div',{class:'ph'});
  const phc = h('div',{class:'con'});
  phc.innerHTML='<h1 class="pt">📿 Mantras & Stotras</h1><p class="ps">13 sacred chants with Sanskrit text, transliteration, meanings, audio, Japa counter & Meditation mode</p>';
  const cats = h('div',{class:'m-cats'});
  const allCats = ['All',...new Set(MANTRAS.map(m=>m.cat))];
  for(const c of allCats){
    cats.appendChild(h('button',{class:`cat-b${state.mantraCat===c?' act':''}`,onclick:()=>{state.mantraCat=c;render()}},c));
  }
  phc.appendChild(cats);
  ph.appendChild(phc);
  wrap.appendChild(ph);

  const c = h('div',{class:'con sec'});
  const layout = h('div',{class:'m-layout'});

  // LIST PANEL
  const list = h('div',{});

  // Search bar
  const searchWrap = h('div',{class:'mantra-search-wrap'});
  searchWrap.innerHTML=`<span class="mantra-search-icon">🔍</span>`;
  const sinp = h('input',{class:'mantra-search-inp',placeholder:'Search mantras...',value:state.mantraSearch});
  sinp.addEventListener('input',e=>{state.mantraSearch=e.target.value;render();});
  searchWrap.appendChild(sinp);
  list.appendChild(searchWrap);

  // Favorites shortcut
  if(state.favorites.length){
    const favLine = h('div',{style:{marginBottom:'8px',display:'flex',alignItems:'center',gap:'6px'}});
    favLine.innerHTML=`<span class="fav-badge">❤️ ${state.favorites.length} Saved</span>`;
    const showFavBtn = h('button',{style:{background:'transparent',border:'none',color:'var(--saffron)',fontSize:'12px',cursor:'pointer',fontFamily:'var(--body)'},onclick:()=>{state.mantraCat='All';state.mantraSearch='';render()}},'Show all');
    favLine.appendChild(showFavBtn);
    list.appendChild(favLine);
  }

  list.appendChild(h('div',{class:'m-list-label'},'Select a Mantra'));

  let filtered = state.mantraCat==='All'?[...MANTRAS]:MANTRAS.filter(m=>m.cat===state.mantraCat);
  if(state.mantraSearch){
    const q=state.mantraSearch.toLowerCase();
    filtered=filtered.filter(m=>m.name.toLowerCase().includes(q)||m.deity.toLowerCase().includes(q)||m.cat.toLowerCase().includes(q)||m.hindi.includes(q));
  }

  for(const m of filtered){
    const isFav = state.favorites.includes(m.id);
    const mi = h('div',{class:`mi${state.selectedMantra?.id===m.id?' act':''}`,onclick:()=>{state.selectedMantra=m;render()}});
    mi.innerHTML=`
      <span class="mi-em">${m.em}</span>
      <div style="flex:1;min-width:0">
        <div class="mi-n">${m.name}${isFav?'<span style="margin-left:5px;font-size:11px">❤️</span>':''}</div>
        <div class="mi-d">${m.deity}</div>
      </div>
      <span class="mi-cat" style="background:${m.col}22;color:${m.col}">${m.cat}</span>
    `;
    // Fav button
    const favBtn = h('button',{class:'mi-fav',onclick:(e)=>{
      e.stopPropagation();
      if(state.favorites.includes(m.id)){
        state.favorites=state.favorites.filter(id=>id!==m.id);
        showToast('Removed from favourites');
      } else {
        state.favorites.push(m.id);
        showToast('❤️ Added to favourites!');
      }
      render();
    }},isFav?'❤️':'🤍');
    mi.appendChild(favBtn);
    list.appendChild(mi);
  }

  if(!filtered.length){
    list.appendChild(Object.assign(h('div',{style:{textAlign:'center',padding:'28px',color:'#999'}}),{innerHTML:'<div style="font-size:32px">🔍</div><p style="margin-top:8px;font-size:13px">No mantras found</p>'}));
  }

  // DETAIL PANEL
  const detail = h('div',{});
  if(state.selectedMantra){
    const m = state.selectedMantra;
    const isFav = state.favorites.includes(m.id);
    const isPlaying = state.audioPlaying && state.audioMantraId === m.id;
    const isPaused = state.audioPaused && state.audioMantraId === m.id;
    const md = h('div',{class:'m-detail'});
    const mdh = h('div',{class:'m-dh',style:{background:`linear-gradient(135deg,${m.col}dd,${m.col}88)`}});
    mdh.innerHTML=`
      <div class="m-dem">${m.em}</div>
      <div style="flex:1">
        <div class="m-dn">${m.name}</div>
        <div class="m-dhi dev">${m.hindi}</div>
        <div class="m-dde">Deity: ${m.deity} · ${m.cat}</div>
      </div>
      <button onclick="if(state.favorites.includes(${m.id})){state.favorites=state.favorites.filter(x=>x!==${m.id});showToast('Removed from favourites');}else{state.favorites.push(${m.id});showToast('❤️ Saved!');}render()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;flex-shrink:0">${isFav?'❤️':'🤍'}</button>
    `;
    const mc = h('div',{class:'m-content'});

    // Build line-by-line highlighted Sanskrit text
    const skLines = m.text.split('\n');
    const romFiltered = m.roman.split('\n').filter(l=>l.trim().length>1 && !/^[॥।0-9]+$/.test(l.trim()));
    let romIdx=0;
    let skHtml='';
    skLines.forEach(line=>{
      if(line.trim()===''){skHtml+='<span style="display:block;height:8px"></span>';return;}
      const isSection = /^[॥।]/.test(line.trim());
      if(isSection){skHtml+=`<span style="display:block;font-size:13px;color:var(--saffron);font-weight:700;margin:6px 0 2px">${line}</span>`;return;}
      const myRomIdx = romIdx++;
      const isActive = isPlaying && window._audioLineIdx===myRomIdx;
      const isDone = isPlaying && window._audioLineIdx>myRomIdx;
      skHtml+=`<span class="sk-line dev${isActive?' sk-line-active':''}${isDone?' sk-line-done':''}">${line}</span>`;
    });

    // Inline audio player bar
    let playerBar='';
    if(isPlaying||isPaused){
      const totalLines=romFiltered.length;
      playerBar=`<div class="audio-line-player" style="margin:-26px -26px 22px">
        <div class="alp-row">
          <span style="font-size:20px">${m.em}</span>
          <div style="flex:1"><div style="font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase">${isPlaying?'🎵 CHANTING':'⏸ PAUSED'}</div><div style="font-size:12px;color:rgba(255,248,240,.75);margin-top:1px">${m.name}</div></div>
          <div id="audio-line-count" style="font-size:11px;color:rgba(255,248,240,.45)">${(window._audioLineIdx||0)+1}/${totalLines}</div>
          <div class="alp-wave">${isPlaying?'<span class="aw"></span><span class="aw" style="animation-delay:.15s"></span><span class="aw" style="animation-delay:.3s"></span>':'<span style="color:rgba(255,248,240,.3);font-size:10px">paused</span>'}</div>
        </div>
        <div style="background:rgba(255,248,240,.1);border-radius:4px;height:4px;overflow:hidden;margin-bottom:6px"><div id="audio-progress" style="height:100%;background:linear-gradient(90deg,var(--saffron),var(--gold));border-radius:4px;width:${window._audioProgress||0}%;transition:width .4s"></div></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:rgba(255,248,240,.3)">Line-by-line chanting mode</span><button onclick="stopAudio()" style="background:transparent;border:none;color:rgba(255,248,240,.5);font-size:11px;cursor:pointer;font-family:var(--body)">⏹ Stop</button></div>
      </div>`;
    }

    mc.innerHTML=`
      ${playerBar}
      <div class="m-block sk-block"><div class="bl">📜 Full Lyrics (Sanskrit / Hindi)</div><div class="sk-text" style="line-height:0">${skHtml}</div></div>
      <div class="m-block"><div class="bl">🔤 Roman Transliteration</div><div class="tr-text" style="white-space:pre-line">${m.roman}</div></div>
      <div class="m-block"><div class="bl">💡 Meaning</div><div class="me-text">${m.meaning}</div></div>
      <div class="m-block"><div class="bl">✨ Spiritual Benefits</div>${m.benefits.map(b=>`<div class="ben-item"><span style="color:${m.col}">✦</span> ${b}</div>`).join('')}</div>
    `;
    const pr = h('div',{class:'pr-row'});
    pr.innerHTML=`<div class="pr-item"><div class="pr-label">Best Time</div><div class="pr-val">⏰ ${m.time}</div></div><div class="pr-item"><div class="pr-label">Repetitions</div><div class="pr-val">📿 ${m.reps}</div></div>`;
    mc.appendChild(pr);

    // Japa Counter
    const japaWrap = h('div',{class:'mala-wrap'});
    const countEl = h('div',{class:'mala-count'},String(state.japaCount));
    const subEl = h('div',{class:'mala-sub'},`${Math.floor(state.japaCount/108)} mala${Math.floor(state.japaCount/108)!==1?'s':''} completed`);
    const btns = h('div',{class:'mala-btns'});
    const tapBtn = h('button',{class:'btn btn-p',style:{fontSize:'16px',padding:'11px 28px'},onclick:()=>{state.japaCount++;render()}},'📿 +1 Japa');
    const plus10 = h('button',{class:'btn btn-o',onclick:()=>{state.japaCount+=10;render()}},'+10');
    const plus108 = h('button',{class:'btn btn-o',onclick:()=>{state.japaCount+=108;render()}},'+108');
    const resetBtn = h('button',{class:'btn',style:{background:'transparent',border:'1px solid #ddd',color:'#999',borderRadius:'30px',padding:'8px 16px',fontSize:'13px'},onclick:()=>{state.japaCount=0;render()}},'↺ Reset');
    btns.append(tapBtn,plus10,plus108,resetBtn);
    japaWrap.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--saffron);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">📿 Japa Counter</div>`;
    japaWrap.appendChild(countEl);
    japaWrap.appendChild(subEl);
    japaWrap.appendChild(btns);
    mc.appendChild(japaWrap);

    const acts = h('div',{class:'m-acts'});
    const audioBtn = h('button',{
      class:'btn btn-p',
      style:{minWidth:'150px'},
      onclick:()=>toggleAudio(m)
    }, isPlaying ? '⏸ Pause' : isPaused ? '▶ Resume' : '🎵 Play & Chant');
    acts.appendChild(audioBtn);

    const copyBtn = h('button',{class:'btn btn-o',onclick:()=>{
      navigator.clipboard?.writeText(m.text+'\n\n'+m.roman+'\n\nMeaning: '+m.meaning);
      showToast('✅ Mantra copied to clipboard!');
      state.copiedMantra=true;render();setTimeout(()=>{state.copiedMantra=false;render()},2000);
    }},state.copiedMantra?'✅ Copied!':'📋 Copy Mantra');
    acts.append(copyBtn,
      h('button',{class:'btn btn-o',onclick:()=>startMedMode(m)},'🧘 Meditate'),
      h('button',{class:'btn btn-o'},'📤 Share')
    );
    mc.appendChild(acts);
    md.append(mdh,mc);
    detail.appendChild(md);
  }
  layout.append(list,detail);
  c.appendChild(layout);
  wrap.appendChild(c);
  return wrap;
}

function buildPooja(){
  const wrap = h('div',{});
  const ph = h('div',{class:'ph'});
  const phc = h('div',{class:'con'});
  phc.innerHTML=`<h1 class="pt">🪔 Pooja Guides</h1><p class="ps">${POOJA_GUIDES.length} complete step-by-step ritual guides with materials list, instructions & filter by type</p>`;

  // Category pills
  const poojaCats = ['All','Daily','Deity','Festival','Occasion','Vedic'];
  const pillRow = h('div',{class:'g-tabs'});
  for(const cat of poojaCats){
    const g = POOJA_GUIDES.filter(p=>cat==='All'||p.cat===cat);
    pillRow.appendChild(h('button',{
      class:`gtab${(state.poojaCat||'All')===cat?' act':''}`,
      onclick:()=>{state.poojaCat=cat;state.poojaGuide=0;state.expandedStep=null;render();}
    },h('span',{},(state.poojaCat||'All')===cat?'✓':''),h('span',{},cat==='All'?`🪔 All (${POOJA_GUIDES.length})`:cat+` (${g.length})`)));
  }
  phc.appendChild(pillRow);

  // Guide tabs within category
  const filteredGuides = (state.poojaCat||'All')==='All' ? POOJA_GUIDES : POOJA_GUIDES.filter(p=>p.cat===state.poojaCat);
  const gt = h('div',{class:'g-tabs',style:{marginTop:'12px'}});
  for(let i=0;i<filteredGuides.length;i++){
    const g=filteredGuides[i];
    gt.appendChild(h('button',{class:`gtab${state.poojaGuide===i?' act':''}`,onclick:()=>{state.poojaGuide=i;state.expandedStep=null;render()}},h('span',{},g.em),h('span',{},g.name)));
  }
  phc.appendChild(gt);
  ph.appendChild(phc);
  wrap.appendChild(ph);

  const c = h('div',{class:'con sec'});
  const g = filteredGuides[state.poojaGuide] || POOJA_GUIDES[0];
  if(!g){wrap.appendChild(c);return wrap;}

  const layout = h('div',{class:'p-layout'});
  // main
  const main = h('div',{});
  const phcard = h('div',{class:'p-hcard'});
  phcard.innerHTML=`<div class="p-em">${g.em}</div><div><div class="p-name">${g.name}</div><div class="p-hi dev">${g.hi}</div><div class="p-badges"><span class="badge" style="background:#FFF3E0;color:#E65100">⏱ ${g.dur}</span><span class="badge" style="background:#E8F5E9;color:#2E7D32;margin-left:6px">🌟 ${g.diff}</span><span class="badge" style="background:#EDE7F6;color:#4527A0;margin-left:6px">🙏 ${g.deity}</span><span class="badge" style="background:rgba(255,107,53,.1);color:var(--saffron);margin-left:6px">📂 ${g.cat}</span></div></div>`;
  main.appendChild(phcard);
  main.appendChild(h('div',{class:'steps-title'},'📋 Step-by-Step Instructions'));
  for(const s of g.steps){
    const sc = h('div',{class:`step-c${state.expandedStep===s.n?' exp':''}`,onclick:()=>{state.expandedStep=state.expandedStep===s.n?null:s.n;render()}});
    const sh = h('div',{class:'step-h'});
    sh.innerHTML=`<div class="step-n">${s.n}</div><span class="step-ic">${s.ic}</span><div class="step-tt">${s.t}</div><div class="step-arr">${state.expandedStep===s.n?'▲':'▼'}</div>`;
    sc.appendChild(sh);
    if(state.expandedStep===s.n){
      sc.appendChild(h('div',{class:'step-body fade-up'},s.d));
    }
    main.appendChild(sc);
  }
  // sidebar
  const sidebar = h('div',{});
  const matCard = h('div',{class:'mat-card'});
  matCard.innerHTML=`<h3>🛒 Materials Required (${g.materials.length} items)</h3>`;
  const ul = h('ul',{class:'mat-list'});
  for(const m of g.materials){
    ul.appendChild(h('li',{class:'mat-item'},h('span',{class:'mat-dot'}),m));
  }
  matCard.appendChild(ul);
  sidebar.appendChild(matCard);
  const tipCard = h('div',{class:'tip-card'});
  tipCard.innerHTML=`<div style="font-size:22px;margin-bottom:8px">💡</div><h4>Spiritual Tip</h4><p>Perform the pooja with a pure heart and focused mind. The sincerity of your devotion matters infinitely more than perfection in the ritual itself. 🙏</p>`;
  sidebar.appendChild(tipCard);
  // AI help button
  const aiCard = h('div',{class:'tip-card',style:{marginTop:'12px',background:'linear-gradient(135deg,var(--deep),var(--maroon-dark))'}});
  aiCard.innerHTML=`<div style="font-size:22px;margin-bottom:8px">🤖</div><h4 style="color:var(--gold)">Ask PANDIT JI</h4><p style="color:rgba(255,248,240,.7)">Have questions about this pooja? Ask our AI assistant for guidance.</p>`;
  aiCard.appendChild(h('button',{class:'btn btn-p',style:{marginTop:'10px',width:'100%'},onclick:()=>navigate('ai')},'Ask a Question →'));
  sidebar.appendChild(aiCard);
  layout.append(main,sidebar);
  c.appendChild(layout);
  wrap.appendChild(c);
  return wrap;
}

function buildTexts(){
  if(state.selectedText) return buildTextDetail(state.selectedText);
  const wrap = h('div',{});
  const ph = h('div',{class:'ph'});
  const phc = h('div',{class:'con'});
  phc.innerHTML='<h1 class="pt">📖 Sacred Texts Library</h1><p class="ps">Explore 9 timeless texts — Vedas, Upanishads, Epics, Puranas, and Yoga philosophy</p>';
  ph.appendChild(phc);
  wrap.appendChild(ph);
  const c = h('div',{class:'con sec'});
  const g = h('div',{class:'tx-grid'});
  for(const t of TEXTS){
    const tc = h('div',{class:'tx-card card',onclick:()=>{state.selectedText=t;render()}});
    tc.innerHTML=`<div class="tx-ew" style="background:${t.col}18"><span class="tx-em">${t.em}</span></div><div class="tx-body"><div class="tx-name">${t.name}</div><div class="tx-hi dev">${t.hi}</div><div class="tx-auth">by ${t.auth}</div><p class="tx-desc">${t.desc.slice(0,100)}...</p><div class="tx-meta"><span class="tag">${t.ch} Chapters</span>${t.v?`<span class="tag">${t.v.toLocaleString()} Verses</span>`:''}<span class="tag">${t.cat}</span></div><div class="tx-verse dev">${t.verse.t.slice(0,50)}...</div></div>`;
    g.appendChild(tc);
  }
  c.appendChild(g);
  wrap.appendChild(c);
  return wrap;
}

function buildTextDetail(t){
  const wrap = h('div',{});
  const ph = h('div',{class:'ph',style:{background:`linear-gradient(135deg,${t.col}ee,${t.col}88)`}});
  const phc = h('div',{class:'con'});
  const bb = h('button',{class:'back-btn',onclick:()=>{state.selectedText=null;render()}},'← Back to Texts');
  phc.innerHTML=`<div style="display:flex;align-items:center;gap:20px;margin-top:16px"><span style="font-size:60px">${t.em}</span><div><h1 class="pt" style="color:#FFF8F0">${t.name}</h1><div class="dev" style="color:rgba(255,248,240,.78);font-size:17px">${t.hi}</div></div></div>`;
  phc.prepend(bb);
  ph.appendChild(phc);
  wrap.appendChild(ph);
  const c = h('div',{class:'con'});
  const g = h('div',{class:'tx-d-grid'});
  const main = h('div',{});
  for(const [ttl,content] of [['About this Text',t.desc]]){
    main.appendChild(Object.assign(h('div',{class:'dc'}),{innerHTML:`<h3>${ttl}</h3><p>${content}</p>`}));
  }
  const tkCard = h('div',{class:'dc'});
  tkCard.innerHTML=`<h3>Key Teachings</h3>${t.teach.map(k=>`<div style="display:flex;gap:10px;margin-bottom:9px;font-size:14px;color:#555"><span style="color:var(--saffron);flex-shrink:0">✦</span>${k}</div>`).join('')}`;
  main.appendChild(tkCard);
  const vCard = h('div',{class:'dc',style:{background:'linear-gradient(135deg,var(--cream),var(--cream2))'}});
  vCard.innerHTML=`<h3>Famous Verse</h3><div class="dev" style="font-size:20px;color:var(--deep);line-height:1.85;margin-bottom:12px">${t.verse.t}</div><div style="font-size:14px;color:#666;font-style:italic">"${t.verse.m}"</div>`;
  main.appendChild(vCard);
  // sidebar
  const sb = h('div',{});
  const ib = h('div',{class:'info-box'});
  ib.innerHTML='<h3>Text Information</h3>';
  for(const [ic,l,v] of [['📚','Category',t.cat],['✍️','Author',t.auth],['📅','Era',t.era],['🌐','Language',t.lang],['📖','Chapters',t.ch],['📝','Verses',t.v||'Multiple']]){
    ib.innerHTML+=`<div class="ir"><span class="ir-icon">${ic}</span><div><div class="ir-label">${l}</div><div class="ir-val">${v}</div></div></div>`;
  }
  sb.appendChild(ib);
  sb.appendChild(h('button',{class:'btn btn-p',style:{width:'100%',padding:'13px',fontSize:'15px',marginBottom:'10px'}},'📖 Start Reading'));
  sb.appendChild(h('button',{class:'btn btn-o',style:{width:'100%',padding:'13px',fontSize:'15px'},onclick:()=>{
    const synth=window.speechSynthesis;
    if(!synth){alert('Text-to-speech not supported in your browser.');return;}
    synth.cancel();
    const utt=new SpeechSynthesisUtterance(`${t.name}. ${t.desc}. Key teachings: ${t.teach.join('. ')}.`);
    const v=synth.getVoices().find(v=>v.lang.startsWith('en'))||synth.getVoices()[0];
    if(v)utt.voice=v; utt.rate=0.8; utt.pitch=0.95;
    synth.speak(utt);
  }},'🔊 Listen Audio'));
  g.append(main,sb);
  c.appendChild(h('div',{style:{paddingTop:'28px',paddingBottom:'48px'}},g));
  wrap.appendChild(c);
  return wrap;
}

function buildFestivals(){
  const wrap = h('div',{});
  const ph = h('div',{class:'ph'});
  ph.innerHTML=`<div class="con"><h1 class="pt">🎉 Hindu Festivals Calendar</h1><p class="ps">${FESTIVALS.length}+ festivals — Vaishnav, Shaiva, Devi, Harvest, Pilgrimage & Regional traditions</p></div>`;
  wrap.appendChild(ph);

  // Category + Search filters
  const filterBar = h('div',{class:'con',style:{paddingTop:'22px',paddingBottom:'4px'}});
  const searchInp = h('input',{class:'s-inp',placeholder:'🔍 Search festivals...',value:state.festivalSearch||'',style:{width:'100%',maxWidth:'360px',marginBottom:'12px',display:'block',borderRadius:'20px'}});
  searchInp.addEventListener('input',e=>{state.festivalSearch=e.target.value;render();});
  filterBar.appendChild(searchInp);

  const catCounts={};
  FESTIVALS.forEach(f=>{catCounts[f.cat]=(catCounts[f.cat]||0)+1;});
  const allCats=['All','Major','Vaishnav','Devi','Shiva','Harvest','Pilgrimage','Jayanti','Light','Regional','Ancestral','Auspicious','Nature'];
  const pills = h('div',{style:{display:'flex',gap:'7px',flexWrap:'wrap'}});
  for(const cat of allCats){
    const count = cat==='All'?FESTIVALS.length:(catCounts[cat]||0);
    if(cat!=='All'&&count===0) continue;
    pills.appendChild(h('button',{
      class:`cat-b${(state.festivalCat||'All')===cat?' act':''}`,
      onclick:()=>{state.festivalCat=cat;render();}
    },`${cat==='All'?'🎉 All':cat} (${count})`));
  }
  filterBar.appendChild(pills);
  wrap.appendChild(filterBar);

  const c = h('div',{class:'con sec',style:{paddingTop:'16px'}});

  let filtered = FESTIVALS;
  if(state.festivalCat && state.festivalCat!=='All') filtered=filtered.filter(f=>f.cat===state.festivalCat);
  if(state.festivalSearch){
    const q=state.festivalSearch.toLowerCase();
    filtered=filtered.filter(f=>f.name.toLowerCase().includes(q)||f.hi.includes(q)||(f.deity&&f.deity.toLowerCase().includes(q))||(f.region&&f.region.toLowerCase().includes(q)));
  }

  const cnt = h('div',{style:{marginBottom:'16px',fontSize:'13px',color:'#888'}},`${filtered.length} festival${filtered.length!==1?'s':''} found`);
  c.appendChild(cnt);

  const g = h('div',{class:'fes-grid'});
  for(const f of filtered){
    const isExp = state.expandedFestival === f.name;
    const fc = h('div',{class:`fes-card card${isExp?' exp':''}`,onclick:()=>{state.expandedFestival=isExp?null:f.name;render()}});
    fc.innerHTML=`
      <div class="fes-em">${f.em}</div>
      <div class="fes-body">
        <div style="margin-bottom:6px;display:flex;gap:5px;flex-wrap:wrap">
          <span style="background:rgba(255,107,53,.1);color:var(--saffron);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">${f.cat}</span>
          ${f.region?`<span style="background:rgba(139,26,26,.07);color:var(--maroon);padding:2px 8px;border-radius:10px;font-size:10px">📍 ${f.region.split(',')[0]}</span>`:''}
        </div>
        <div class="fes-name">${f.name}</div>
        <div class="fes-hi dev">${f.hi}</div>
        <div class="fes-month">📅 ${f.month}${f.date?` · ${f.date}`:''}</div>
        <div class="fes-deity">🙏 ${f.deity}</div>
        ${isExp
          ? `<div class="fes-detail" style="margin-top:10px">
              <p class="fes-desc">${f.desc}</p>
              ${f.rituals?`<div style="margin-top:10px"><div style="font-size:11px;font-weight:700;color:var(--saffron);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">Key Rituals</div>${f.rituals.map(r=>`<div style="display:flex;gap:7px;font-size:12px;color:#555;margin-bottom:4px"><span style="color:var(--saffron)">✦</span>${r}</div>`).join('')}</div>`:''}
             </div>`
          : `<p class="fes-desc" style="margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${f.desc}</p><span style="font-size:12px;color:var(--saffron);font-weight:600;display:inline-block;margin-top:4px">Tap for rituals & details ↓</span>`
        }
      </div>`;
    g.appendChild(fc);
  }
  c.appendChild(g);
  if(!filtered.length) c.innerHTML+=`<div style="text-align:center;padding:48px;color:#999"><div style="font-size:48px">🎉</div><p style="margin-top:12px">No festivals found. Try a different filter.</p></div>`;
  wrap.appendChild(c);
  return wrap;
}

const AI_SYSTEM = `You are PANDIT JI, a knowledgeable, warm, and compassionate Hindu Spiritual Assistant. You have deep expertise in the Vedas, Upanishads, Bhagavad Gita, Ramayana, Mahabharata, Puranas, Hindu deities, temples, rituals, festivals, Vedic astrology, Ayurveda, Vastu Shastra, and Hindu philosophy. Respond with warmth and spiritual wisdom. Use Sanskrit terms with translations. Include relevant shlokas when appropriate. Begin responses with "Namaste 🙏".`;

const QUICK_QS = [
  "What is the meaning of OM (ॐ)?","Explain the concept of Dharma",
  "Who are the Navagrahas?","What is Karma in Hindu philosophy?",
  "Tell me about the Char Dham pilgrimage","What is the significance of Tulsi plant?",
  "Explain Navratri and its nine forms of Durga","What are the 4 Vedas?",
  "How to do a simple daily pooja at home?","What is Moksha?",
  "Difference between Brahma, Vishnu and Shiva?","What is Vaastu Shastra?",
];

async function sendAI(text){
  const userText=(text||state.chatInput).trim();
  if(!userText||state.chatLoading)return;
  state.chatMsgs.push({role:'user',text:userText});
  state.chatInput='';state.chatLoading=true;render();
  try{
    const history=state.chatMsgs.slice(1).filter(m=>m.text&&m.text.length<2000)
      .slice(-20).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text.replace(/<[^>]*>/g,'').slice(0,500)}));
    const cleaned=[];
    for(const msg of history){if(!cleaned.length||cleaned[cleaned.length-1].role!==msg.role)cleaned.push(msg);}
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1024,system:AI_SYSTEM,
        messages:cleaned.length?cleaned:[{role:'user',content:userText}]})
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const reply=data.content?.[0]?.text||'🙏 Unable to generate response. Please try again.';
    state.chatMsgs.push({role:'ai',text:reply});
  }catch(e){
    const q=userText.toLowerCase();
    let reply='';
    if(q.includes('om')||q.includes('ॐ'))reply='Namaste 🙏\n\n**OM (ॐ)** is the primordial sound of the universe. Its three components A-U-M represent the waking, dreaming, and deep sleep states. The silence after OM is Turiya — pure consciousness.\n\n*"OM is all this." — Mandukya Upanishad*';
    else if(q.includes('karma'))reply='Namaste 🙏\n\n**Karma** literally means action. Three types:\n• **Sanchita** — accumulated from all past lives\n• **Prarabdha** — being experienced now\n• **Agami** — created by present actions\n\nBhagavad Gita: *"You have the right to perform your duties, but not to the fruits of action."*';
    else if(q.includes('dharma'))reply='Namaste 🙏\n\n**Dharma** is the cosmic law of righteous living — your duty based on your nature, role, and stage of life. *"Yato dharmas tato jayah"* — Where there is Dharma, there is Victory. (Mahabharata)';
    else if(q.includes('shiva')||q.includes('mahadev'))reply='Namaste 🙏\n\n**Lord Shiva** is the Destroyer and Transformer of the Hindu Trinity. He meditates on Mount Kailash, wears the crescent moon, and holds the Trishul (trident). His Lingam represents the infinite cosmic pillar of light.\n\n🔱 *Om Namah Shivaya* — I bow to the inner Self.';
    else if(q.includes('krishna'))reply='Namaste 🙏\n\n**Lord Krishna** is the eighth avatar of Vishnu — the divine charioteer who delivered the Bhagavad Gita. He teaches Karma Yoga (selfless action), Bhakti Yoga (devotion), and Jnana Yoga (wisdom).\n\n🪈 *Hare Krishna Hare Krishna, Krishna Krishna Hare Hare*';
    else if(q.includes('gita')||q.includes('bhagavad'))reply='Namaste 🙏\n\n**Bhagavad Gita** — "Song of God" — is Lord Krishna\'s divine discourse to Arjuna on the battlefield of Kurukshetra. 18 chapters covering Karma, Bhakti, Jnana and Raja Yoga.\n\n*"The soul is never born nor dies at any time."* — Gita 2.20';
    else if(q.includes('meditation')||q.includes('dhyana'))reply='Namaste 🙏\n\n**Dhyana** is the seventh limb of Ashtanga Yoga. Begin with:\n1. Comfortable seated posture\n2. Close eyes, watch breath\n3. Chant OM mentally\n4. When thoughts arise — observe without judgment, return to OM\n\nStart with 10 minutes daily at sunrise 🧘';
    else if(q.includes('gayatri'))reply='Namaste 🙏\n\n**Gayatri Mantra** (ॐ भूर्भुवः स्वः...): Chant at sunrise, noon, and sunset facing the Sun. 108 repetitions purify the mind and awaken divine wisdom.\n\n*"We meditate on the glorious light of the divine Sun. May it stimulate our intellects."*';
    else if(q.includes('temple')||q.includes('mandir'))reply='Namaste 🙏\n\nA Hindu temple (Mandir) is not just a building — it is the body of the deity. The Garbhagriha (inner sanctum) represents the womb of creation. The Gopuram (tower) is the cosmic mountain. Visiting a temple aligns your energy with the divine.\n\n🛕 PANDIT JI has information on 66+ temples worldwide!';
    else reply=`Namaste 🙏 I am **PANDIT JI**, your Hindu Spiritual Assistant.\n\n*Note: AI connection is currently unavailable. Here is what I know from built-in knowledge.*\n\nYou asked: *"${userText}"*\n\nI can help with: Mantras 📿, Temples 🛕, Sacred Texts 📖, Pooja Rituals 🪔, Vedic Astrology ⭐, Meditation 🧘, Hindu Philosophy 🕉️\n\nTry: "What is Karma?", "Tell me about Lord Shiva", "How to meditate?" 🙏`;
    state.chatMsgs.push({role:'ai',text:reply});
  }
  state.chatLoading=false;render();
}

function buildAI(){

    feats.appendChild(h('div',{class:'afi'},h('span',{},ic),h('span',{},t)));
  }
  qp.appendChild(feats);
  const cw=h('div',{class:'chat-win'});
  const chdr=h('div',{class:'chat-hdr'});
  chdr.innerHTML=`<div class="chat-av">🕉️</div><div class="chat-info"><div class="chat-nm">PANDIT JI</div><div class="chat-st"><span class="live-dot" style="width:7px;height:7px"></span> AI-Powered Spiritual Wisdom</div></div>`;
  const clrBtn=h('button',{class:'chat-clr',onclick:()=>{state.chatMsgs=[state.chatMsgs[0]];render()}},'🗑️ Clear');
  chdr.appendChild(clrBtn);
  cw.appendChild(chdr);
  const msgs=h('div',{class:'chat-msgs',id:'chat-msgs'});
  for(const m of state.chatMsgs){
    const msgEl=h('div',{class:`msg ${m.role==='ai'?'assistant':'user'}`});
    if(m.role==='ai')msgEl.appendChild(h('div',{class:'msg-av'},'🕉️'));
    const mb=h('div',{class:'mb'});
    const mt=h('div',{class:'msg-t',html:m.text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br/>')});
    mb.appendChild(mt);msgEl.appendChild(mb);msgs.appendChild(msgEl);
  }
  if(state.chatLoading){
    const lm=h('div',{class:'msg assistant'});
    lm.innerHTML='<div class="msg-av">🕉️</div><div class="mb"><div class="msg-t"><div class="typing"><span></span><span></span><span></span></div><div style="font-size:12px;color:#999;margin-top:4px">PANDIT JI is contemplating...</div></div></div>';
    msgs.appendChild(lm);
  }
  cw.appendChild(msgs);
  const ia=h('div',{class:'chat-inp-a'});
  const ci=h('input',{class:'chat-inp',placeholder:'Ask about mantras, temples, rituals, deities, philosophy...',value:state.chatInput,disabled:state.chatLoading});
  ci.addEventListener('input',e=>state.chatInput=e.target.value);
  ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey)sendAI()});
  const sb2=h('button',{class:'send-btn btn btn-p',disabled:state.chatLoading||!state.chatInput.trim(),onclick:()=>sendAI()},state.chatLoading?'...':'🙏 Send');
  ia.append(ci,sb2);cw.appendChild(ia);
  layout.append(qp,cw);c.appendChild(layout);wrap.appendChild(c);
  return wrap;
}

// ═══════════════════════════
// AUDIO ENGINE — LINE-BY-LINE
// ═══════════════════════════
window._audioLines=[];window._audioLineIdx=0;window._audioTimer=null;window._audioProgress=0;

function getAudioLines(m){
  return m.roman.split('\n').map(l=>l.trim()).filter(l=>l.length>1&&!/^[॥।0-9]+$/.test(l));
}
function highlightAudioLine(idx){
  document.querySelectorAll('.sk-line').forEach((el,i)=>{
    el.classList.toggle('sk-line-active',i===idx);
    el.classList.toggle('sk-line-done',i<idx);
    if(i===idx)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}
function speakLines(lines,idx,m,onDone){
  if(!state.audioPlaying||idx>=lines.length){if(onDone)onDone();return;}
  window._audioLineIdx=idx;highlightAudioLine(idx);
  const synth=window.speechSynthesis;
  const utt=new SpeechSynthesisUtterance(lines[idx]);
  const voices=synth.getVoices();
  const preferred=voices.find(v=>v.lang.startsWith('hi'))||voices.find(v=>v.lang.startsWith('en')&&!v.name.toLowerCase().includes('male'))||voices.find(v=>v.lang.startsWith('en'))||voices[0];
  if(preferred)utt.voice=preferred;
  utt.rate=0.62;utt.pitch=1.05;utt.volume=1.0;
  utt.onend=()=>{
    window._audioProgress=Math.round(((idx+1)/lines.length)*100);
    const bar=document.getElementById('audio-progress');if(bar)bar.style.width=window._audioProgress+'%';
    const cnt=document.getElementById('audio-line-count');if(cnt)cnt.textContent=`${idx+2}/${lines.length}`;
    setTimeout(()=>speakLines(lines,idx+1,m,onDone),320);
  };
  utt.onerror=()=>{state.audioPlaying=false;state.audioPaused=false;state.audioMantraId=null;render();};
  window._speechUtterance=utt;synth.speak(utt);
}
function toggleAudio(m){
  const synth=window.speechSynthesis;
  if(!synth){alert('Text-to-speech not supported. Please use Chrome or Edge.');return;}
  if(state.audioMantraId===m.id&&state.audioPlaying){synth.pause();state.audioPlaying=false;state.audioPaused=true;render();return;}
  if(state.audioMantraId===m.id&&state.audioPaused){synth.resume();state.audioPlaying=true;state.audioPaused=false;render();return;}
  synth.cancel();window._audioProgress=0;window._audioLineIdx=0;
  const lines=getAudioLines(m);window._audioLines=lines;
  state.audioPlaying=true;state.audioPaused=false;state.audioMantraId=m.id;render();
  speakLines(lines,0,m,()=>{
    state.audioPlaying=false;state.audioPaused=false;state.audioMantraId=null;
    window._audioProgress=0;window._audioLineIdx=0;
    document.querySelectorAll('.sk-line').forEach(el=>{el.classList.remove('sk-line-active','sk-line-done');});
    render();
  });
}
function stopAudio(){
  window.speechSynthesis.cancel();state.audioPlaying=false;state.audioPaused=false;state.audioMantraId=null;
  window._audioProgress=0;window._audioLineIdx=0;
  document.querySelectorAll('.sk-line').forEach(el=>{el.classList.remove('sk-line-active','sk-line-done');});
  render();
}
function startMedMode(m){state.medMantra=m;state.medMode=true;state.medPlaying=false;state.medCount=0;state.medElapsed=0;render();}
function toggleMedPlay(){
  const synth=window.speechSynthesis;if(!synth)return;
  if(state.medPlaying){synth.pause();state.medPlaying=false;clearInterval(window._medTimer);render();return;}
  state.medPlaying=true;
  function chantOnce(){
    if(!state.medPlaying)return;synth.cancel();
    const m=state.medMantra;
    const utt=new SpeechSynthesisUtterance(m.roman.replace(/\n/g,' '));
    const voices=synth.getVoices();const v=voices.find(v=>v.lang.startsWith('en'))||voices[0];
    if(v)utt.voice=v;utt.rate=state.medSpeed||0.78;utt.pitch=0.9;
    utt.onend=()=>{state.medCount++;chantOnce();render();};
    utt.onerror=()=>{state.medPlaying=false;render();};
    synth.speak(utt);
  }
  chantOnce();
  window._medTimer=setInterval(()=>{
    state.medElapsed++;
    const el=document.getElementById('med-timer');
    if(el){const m=Math.floor(state.medElapsed/60),s=state.medElapsed%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
    const cc=document.getElementById('med-count');if(cc)cc.textContent=state.medCount;
  },1000);
  render();
}
function closeMedMode(){
  window.speechSynthesis.cancel();clearInterval(window._medTimer);
  state.medMode=false;state.medPlaying=false;state.medCount=0;state.medElapsed=0;render();
}
function buildMedOverlay(){
  const m=state.medMantra;
  const mins=Math.floor(state.medElapsed/60),secs=state.medElapsed%60;
  const ov=document.createElement('div');ov.className='med-overlay';
  ov.innerHTML=`<button class="med-close" onclick="closeMedMode()">✕</button><div class="med-om${state.medPlaying?' med-pulsing':''}">ॐ</div><div class="med-name">${m.name}</div><div class="med-deity">${m.hindi} · ${m.deity}</div><div class="med-text dev">${m.text}</div><div class="med-controls"><button class="med-btn" onclick="state.medCount=Math.max(0,state.medCount-1);render()">−</button><button class="med-btn primary" onclick="toggleMedPlay()">${state.medPlaying?'⏸':'▶'}</button><button class="med-btn" onclick="window.speechSynthesis.cancel();clearInterval(window._medTimer);state.medPlaying=false;state.medElapsed=0;render()">⏹</button></div><div class="med-count-disp" id="med-count">${state.medCount}</div><div class="med-count-sub">Chants · ${Math.floor(state.medCount/108)} mala${Math.floor(state.medCount/108)!==1?'s':''}</div><div class="med-timer" id="med-timer">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div><div class="med-speed">${[['Slow',0.6],['Normal',0.78],['Fast',1.0]].map(([l,v])=>`<button class="med-speed-btn${(state.medSpeed||0.78)===v?' act':''}" onclick="state.medSpeed=${v};render()">${l}</button>`).join('')}</div>`;
  document.body.appendChild(ov);
}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.getVoices();};}

render();
</script>
